<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://otmzadpotobeyowsblpz.supabase.co'; // 'a' ပါတာ သေချာပါစေ
        const SUPABASE_KEY = 'sb_publishable_dWshc23rPI0opSLiOCzjTw_fGqOVF7W'; // ခုနက copy ကူးလာတဲ့ Key ကို ဒီမှာထည့်ပါ

       // သေချာအောင် window.supabase ကို အရင်သတ်မှတ်ပါ
const { createClient } = window.supabase; 
window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// အခုလိုမျိုး console မှာ ထုတ်ကြည့်လို့ရအောင် window ထဲ ထည့်ထားရမှာပါ
console.log("Supabase initialized:", window.supabase);

        // 2. Realtime Initialization
        function initRealtime() {
            if (!supabase) return;

            const channel = supabase
                .channel('realtime_messages')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'messages' },
                    (payload) => {
                        console.log('New Message Arrived:', payload.new);
                        // script.js ထဲက function တွေကို ခေါ်ယူခြင်း
                        if (typeof loadContacts === 'function') loadContacts();
                        if (typeof loadHistory === 'function') {
                            // လက်ရှိ chat ဖွင့်ထားတဲ့ user ရဲ့ message ဖြစ်မှ update လုပ်မယ်
                            const activeContactId = window.currentContactId; 
                            if(activeContactId) loadHistory(activeContactId);
                        }
                        
                        const sound = document.getElementById('notif-sound');
                        if (sound) sound.play().catch(e => console.log('Audio play blocked'));
                    }
                )
                .subscribe();
        }

        // Navigation Functions
        function switchToInbox() {
            document.getElementById('main-dashboard-content').classList.remove('hidden');
            document.getElementById('bot-settings-area').classList.add('hidden');
            
            // Active UI state
            resetNavStyles();
            document.getElementById('inbox-nav').classList.add('active-nav', 'bg-white/5');
        }

        function loadBotSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('settings-frame').src = "bot-config.html";

            resetNavStyles();
            document.getElementById('bot-config-nav').classList.add('active-nav', 'bg-white/5');
        }

        function loadBroadcastSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('settings-frame').src = "broadcast.html";

            resetNavStyles();
            document.getElementById('broadcast-nav').classList.add('active-nav', 'bg-white/5');
        }

        function loadGeneralSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('settings-frame').src = "general-settings.html";

            resetNavStyles();
            document.getElementById('sidebar-settings').classList.add('active-nav', 'bg-white/5');
        }

        function resetNavStyles() {
            const navs = ['inbox-nav', 'bot-config-nav', 'broadcast-nav', 'sidebar-settings'];
            navs.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.remove('active-nav', 'bg-white/5');
            });
        }

        function toggleDropdown() {
            const dropdown = document.getElementById('messenger-dropdown');
            const arrow = document.getElementById('arrow-icon');
            dropdown.classList.toggle('hidden');
            arrow.classList.toggle('rotate-90');
        }

        function toggleRightPanel() {
            const panel = document.getElementById('right-panel');
            panel.classList.toggle('hidden');
        }

        function toggleLeftSidebar() {
            const sidebar = document.getElementById('left-sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
    </script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0d0d0d',
                        'border-gray': 'rgba(255, 255, 255, 0.08)',
                        'accent-blue': '#007AFF',
                        'ios-gray': '#1c1c1e',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .active-nav { color: #007AFF !important; border-left: 3px solid #007AFF; border-radius: 0 16px 16px 0 !important; }
        @media (max-width: 1024px) {
            #left-sidebar { position: fixed; height: 100%; top: 0; left: 0; }
        }
    </style>
</head>
<body class="h-full flex overflow-hidden bg-pure-black text-gray-100 font-sans">

    <div id="main-app" class="h-full w-full flex overflow-hidden">
        
        <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

        <div id="left-sidebar" class="w-72 flex-shrink-0 flex flex-col border-r border-border-gray py-8 bg-dark-gray/50 backdrop-blur-2xl z-30 transition-all duration-300 -translate-x-full lg:translate-x-0">
            <div class="px-8 mb-12 cursor-pointer flex items-center group" onclick="switchToInbox()">
                <div class="w-10 h-10 bg-accent-blue rounded-[12px] flex items-center justify-center">
                    <span class="text-white text-lg font-extrabold">ON</span>
                </div>
                <span class="ml-4 text-xl font-black italic uppercase tracking-tighter">OmniBot</span>
            </div>
            
            <nav class="flex flex-col w-full flex-1 px-4 space-y-2">
                <div class="nav-item flex items-center justify-between p-4 rounded-2xl cursor-pointer hover:bg-white/5 active-nav" id="inbox-nav" onclick="switchToInbox()">
                    <div class="flex items-center">
                        <i class="fas fa-message w-8"></i>
                        <span class="font-medium ml-2">Inbox</span>
                    </div>
                    <i id="arrow-icon" class="fas fa-chevron-right text-[10px] opacity-40 transition-transform" onclick="event.stopPropagation(); toggleDropdown()"></i>
                </div>
                
                <div id="messenger-dropdown" class="hidden ml-4 pl-4 border-l border-border-gray space-y-1">
                    <div class="p-3 rounded-xl hover:bg-white/5 cursor-pointer text-sm text-gray-400">Messenger</div>
                    <div class="p-3 rounded-xl hover:bg-white/5 cursor-pointer text-sm text-gray-400">Telegram</div>
                </div>

                <div id="bot-config-nav" class="p-4 rounded-2xl cursor-pointer hover:bg-white/5 flex items-center" onclick="loadBotSettings()">
                    <i class="fas fa-sliders-h w-8"></i>
                    <span class="font-medium ml-2">Bot Config</span>
                </div>

                <div id="broadcast-nav" class="p-4 rounded-2xl cursor-pointer hover:bg-white/5 flex items-center" onclick="loadBroadcastSettings()">
                    <i class="fas fa-paper-plane w-8"></i>
                    <span class="font-medium ml-2">Bulk Messaging</span>
                </div>
            </nav>

            <div class="mt-auto px-4">
                <div onclick="loadGeneralSettings()" class="p-4 rounded-2xl cursor-pointer hover:bg-white/5 flex items-center" id="sidebar-settings">
                    <i class="fas fa-cog w-8"></i>
                    <span class="font-medium ml-2">Settings</span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0">
            <div class="h-20 border-b border-border-gray flex items-center px-8 justify-between bg-dark-gray/30 backdrop-blur-xl z-10">
                <button onclick="toggleLeftSidebar()" class="lg:hidden w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                    <i class="fas fa-bars text-gray-400"></i>
                </button>
                <div class="flex items-center space-x-4">
                    <div class="text-right hidden md:block">
                        <p class="text-sm font-bold">Admin</p>
                        <p class="text-[10px] text-accent-blue font-black uppercase">Master</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=007AFF&color=fff" class="w-10 h-10 rounded-2xl border-2 border-border-gray">
                </div>
            </div>

            <div id="main-dashboard-content" class="flex flex-1 overflow-hidden">
                <div class="w-80 flex-shrink-0 flex flex-col border-r border-border-gray bg-pure-black hidden md:flex">
                    <div class="p-8 pb-4">
                        <h2 class="text-2xl font-black italic uppercase">Inbox</h2>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Recent Messages</p>
                    </div>
                    <div id="contacts-container" class="flex-1 overflow-y-auto px-4 py-2 space-y-2">
                        </div>
                </div>

                <div class="flex-1 flex flex-col bg-pure-black relative min-w-0">
                    <div class="h-20 border-b border-border-gray flex items-center px-8 justify-between bg-dark-gray/20">
                        <div class="flex items-center gap-4">
                            <div id="header-avatar-text" class="w-11 h-11 rounded-2xl bg-accent-blue flex items-center justify-center font-black">?</div>
                            <div>
                                <h3 id="chat-header-name" class="font-bold">Select a conversation</h3>
                                <p id="chat-status" class="text-[10px] text-gray-500 uppercase font-bold">Waiting...</p>
                            </div>
                        </div>
                        <button onclick="toggleRightPanel()" class="w-10 h-10 rounded-full bg-white/5 hover:text-accent-blue transition">
                            <i class="fas fa-info-circle"></i>
                        </button>
                    </div>

                    <div id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-6 flex flex-col bg-gradient-to-br from-accent-blue/5 to-transparent">
                        </div>

                    <div class="p-6 md:p-8">
                        <form onsubmit="event.preventDefault(); sendMessage();" class="flex items-center gap-4 bg-ios-gray/80 backdrop-blur-xl border border-border-gray rounded-3xl px-6 py-3">
                            <input type="text" id="user-input" placeholder="Type a message..." class="bg-transparent flex-1 outline-none text-sm text-white">
                            <button type="submit" class="w-11 h-11 rounded-2xl bg-accent-blue text-white shadow-lg hover:scale-105 transition-all">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <div id="right-panel" class="hidden w-80 border-l border-border-gray bg-dark-gray/50 backdrop-blur-3xl flex flex-col p-8 space-y-10">
                    <div class="text-center space-y-5">
                        <div id="side-avatar-text" class="w-24 h-24 bg-accent-blue rounded-[2rem] mx-auto flex items-center justify-center text-4xl font-black shadow-xl">?</div>
                        <h4 id="side-name" class="font-black text-xl italic uppercase">Profile Name</h4>
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] text-gray-400 font-black uppercase">Internal Notes</label>
                        <textarea id="contact-note" class="w-full h-40 bg-ios-gray/50 border border-border-gray rounded-2xl p-5 text-sm outline-none resize-none" placeholder="Private notes..."></textarea>
                    </div>
                </div>
            </div>

            <div id="bot-settings-area" class="hidden flex-1 flex flex-col bg-pure-black">
                <iframe src="about:blank" id="settings-frame" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            switchToInbox();
        });
    </script>
</body>
</html>
