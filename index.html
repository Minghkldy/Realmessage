<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0a0a0a',
                        'border-gray': '#1f1f1f',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .active-contact { border-left: 3px solid #3B82F6; background-color: #0f0f0f; }
        
        /* Sidebar Styles */
        #left-sidebar { transition: width 0.3s ease; width: 220px; }
        .sidebar-collapsed { width: 70px !important; }
        .sidebar-collapsed .nav-text { display: none; }

        /* Notification Badge Style */
        .noti-badge {
            background-color: #3B82F6;
            color: white;
            font-size: 10px;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }
    </style>
</head>
<body class="h-full flex overflow-hidden">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="left-sidebar" class="flex-shrink-0 flex flex-col border-r border-border-gray py-6 bg-dark-gray">
        <div class="px-6 mb-10 flex items-center gap-3">
            <i class="fas fa-robot text-accent-blue text-2xl"></i>
            <span class="nav-text font-bold text-xl">OmniBot</span>
        </div>
        
        <nav class="flex flex-col w-full">
            <div class="flex items-center gap-4 px-6 py-4 cursor-pointer text-accent-blue bg-white/5">
                <i class="fas fa-th-large text-xl"></i>
                <span class="nav-text">Inbox</span>
                <span id="global-msg-count" class="noti-badge ml-auto hidden">0</span>
            </div>
            <div class="px-6 py-4 text-gray-600 hover:text-white cursor-pointer transition"><i class="fab fa-facebook-messenger text-xl"></i></div>
            <div class="px-6 py-4 text-gray-600 hover:text-white cursor-pointer transition"><i class="fab fa-instagram text-xl"></i></div>
            <div class="px-6 py-4 text-gray-600 hover:text-white cursor-pointer transition"><i class="fab fa-telegram text-xl"></i></div>
        </nav>

        <div class="mt-auto px-6 py-4 text-gray-600 cursor-pointer hover:text-white transition">
            <i class="fas fa-cog text-xl"></i>
        </div>
    </div>

    <div class="w-80 flex-shrink-0 flex flex-col border-r border-border-gray bg-pure-black">
        <div class="p-5 border-b border-border-gray flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-bars text-gray-500 cursor-pointer" onclick="toggleLeftSidebar()"></i>
                <h2 class="font-bold text-sm uppercase tracking-widest">Inbox</h2>
            </div>
        </div>
        <div id="contacts-container" class="flex-1 overflow-y-auto p-2 space-y-1">
            </div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div class="h-16 border-b border-border-gray flex items-center px-6 justify-between bg-dark-gray">
            <div class="flex items-center gap-3">
                <div id="header-avatar" class="w-9 h-9 rounded-full bg-accent-blue flex items-center justify-center font-bold text-xs">?</div>
                <div>
                    <h3 id="chat-header-name" class="text-sm font-bold">Select a chat</h3>
                    <p id="chat-status" class="text-[10px] text-gray-500 uppercase">Waiting...</p>
                </div>
            </div>
            <i class="fas fa-user-circle text-xl text-gray-500 cursor-pointer" onclick="toggleRightPanel()"></i>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-4"></div>

        <div class="p-6 border-t border-border-gray">
            <div class="flex items-center gap-4 bg-dark-gray border border-border-gray rounded-xl px-4 py-2">
                <i class="fas fa-paperclip text-gray-500"></i>
                <input type="text" id="user-input" onkeypress="handleKeyPress(event)" placeholder="Reply here..." class="bg-transparent flex-1 outline-none text-sm">
                <button onclick="sendMessage()" class="text-accent-blue"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const notifSound = document.getElementById('notif-sound');
        const contactsContainer = document.getElementById('contacts-container');
        const globalMsgBadge = document.getElementById('global-msg-count');
        
        let currentChatId = "";
        let allMessages = [];
        let unreadCounts = {}; // Key: chat_id, Value: unread count

        function toggleLeftSidebar() {
            document.getElementById('left-sidebar').classList.toggle('sidebar-collapsed');
        }

        async function loadContacts() {
            try {
                const res = await fetch('/api/contacts');
                const contacts = await res.json();
                renderContactList(contacts);
            } catch (err) { console.error("Error loading contacts:", err); }
        }

        function renderContactList(contacts) {
            contactsContainer.innerHTML = '';
            let totalUnread = 0;

            contacts.forEach(c => {
                const count = unreadCounts[c.chat_id] || 0;
                totalUnread += count;
                
                const isSelected = currentChatId === c.chat_id;
                const contactDiv = document.createElement('div');
                contactDiv.className = `p-3 rounded-lg flex items-center gap-3 cursor-pointer transition hover:bg-dark-gray ${isSelected ? 'active-contact' : ''}`;
                contactDiv.onclick = () => selectContact(c);

                contactDiv.innerHTML = `
                    <div class="relative">
                        <img src="${c.profile_pic || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full object-cover">
                        ${count > 0 ? `<div class="absolute -top-1 -right-1 noti-badge">${count}</div>` : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate ${count > 0 ? 'text-white' : 'text-gray-400'}">${c.nickname || c.first_name}</p>
                        <p class="text-[10px] text-gray-600 uppercase">${c.platform}</p>
                    </div>
                `;
                contactsContainer.appendChild(contactDiv);
            });

            // Update Global Noti on Sidebar
            if (totalUnread > 0) {
                globalMsgBadge.innerText = totalUnread;
                globalMsgBadge.classList.remove('hidden');
            } else {
                globalMsgBadge.classList.add('hidden');
            }
        }

        function selectContact(contact) {
            currentChatId = contact.chat_id;
            
            // ဝင်ကြည့်လိုက်ရင် Noti Reset လုပ်မယ်
            unreadCounts[currentChatId] = 0;
            
            document.getElementById('chat-header-name').innerText = contact.nickname || contact.first_name;
            document.getElementById('chat-status').innerText = `${contact.platform} ACTIVE`;
            
            // UI Update
            loadContacts();
            renderMessages();
        }

        socket.on('new_message', (data) => {
            const incomingId = data.chat_id || data.chatId;
            
            // အကယ်၍ လက်ရှိဖွင့်မထားတဲ့ Chat ဆိုရင် Noti တိုးမယ်
            if (incomingId !== currentChatId) {
                unreadCounts[incomingId] = (unreadCounts[incomingId] || 0) + 1;
                notifSound.play().catch(() => {});
            }
            
            allMessages.push(data);
            if (incomingId === currentChatId) {
                appendMessage(data, false);
            }
            loadContacts();
        });

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text || !currentChatId) return;

            socket.emit('send_reply', { chatId: currentChatId, text: text });
            
            const newMsg = { text: text, sender_type: 'bot', chat_id: currentChatId };
            allMessages.push(newMsg);
            appendMessage(newMsg, true);
            
            // စာပြန်လိုက်ရင်လည်း Noti Reset ဖြစ်ရမယ်
            unreadCounts[currentChatId] = 0;
            input.value = "";
            loadContacts();
        }

        function renderMessages() {
            chatWindow.innerHTML = "";
            const filtered = allMessages.filter(m => (m.chat_id === currentChatId || m.chatId === currentChatId));
            filtered.forEach(msg => appendMessage(msg, msg.sender_type === 'bot'));
        }

        function appendMessage(data, isBot) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isBot ? "self-end max-w-[80%] bg-accent-blue p-3 rounded-2xl rounded-tr-none text-sm" : 
                                     "self-start max-w-[80%] bg-dark-gray border border-border-gray p-3 rounded-2xl rounded-tl-none text-sm";
            msgDiv.innerText = data.text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        async function loadHistory() {
            const res = await fetch('/api/messages');
            allMessages = await res.json();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        window.onload = async () => {
            await loadHistory();
            await loadContacts();
        };
    </script>
</body>
</html>
