<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': 'var(--bg-pure-black)',
                        'dark-gray': 'var(--bg-dark-gray)',
                        'border-gray': 'var(--border-color)',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        /* Default Variables (Dark Mode Off ဖြစ်နေချိန် - Light/Gray Mode) */
        :root {
            --bg-pure-black: #ffffff;
            --bg-dark-gray: #f3f4f6;
            --border-color: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        /* Dark Mode On ဖြစ်နေချိန် Variables */
        body.dark-mode {
            --bg-pure-black: #000000;
            --bg-dark-gray: #0a0a0a;
            --border-color: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
        }

        body { 
            background-color: var(--bg-pure-black); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            transition: background-color 0.3s, color 0.3s;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .active-contact { border-left: 3px solid #3B82F6; background-color: rgba(59, 130, 246, 0.1); }
        
        #left-sidebar { 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 240px;
            background-color: var(--bg-dark-gray);
            border-right: 1px solid var(--border-color);
        }
        
        .sidebar-collapsed { width: 80px !important; }
        .sidebar-collapsed .nav-text, 
        .sidebar-collapsed .dropdown-arrow,
        .sidebar-collapsed #messenger-dropdown { display: none !important; }
        .sidebar-collapsed .nav-item { justify-content: center; padding: 12px 0; }

        .nav-item { 
            display: flex; align-items: center; gap: 16px; width: 100%; 
            padding: 12px 24px; cursor: pointer; transition: 0.2s; color: var(--text-muted);
        }
        .nav-item:hover { color: var(--text-main); background-color: rgba(255,255,255,0.05); }
        .nav-text { font-size: 14px; font-weight: 500; white-space: nowrap; }
        .active-nav { color: #3B82F6; background-color: rgba(59, 130, 246, 0.05); }

        #messenger-dropdown { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        #messenger-dropdown.show { max-height: 400px; }
        
        #chat-list-container, #right-panel, .h-16 {
            background-color: var(--bg-dark-gray);
            border-color: var(--border-color);
        }

        #imagePreviewModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center;
        }
    </style>
</head>
<body class="h-full flex overflow-hidden">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="imagePreviewModal" onclick="closeImagePreview()">
        <img id="previewImg" src="" onclick="event.stopPropagation()">
    </div>

    <div id="left-sidebar" class="flex-shrink-0 flex flex-col py-6 z-20">
        <div class="text-2xl font-bold text-accent-blue px-6 mb-10 cursor-pointer flex items-center" onclick="toggleLeftSidebar()">
            <i class="fas fa-robot w-6 text-center"></i>
            <span class="nav-text ml-3">OmniBot</span>
        </div>
        
        <nav class="flex flex-col w-full flex-1">
            <div class="nav-item active-nav" id="inbox-nav" onclick="switchToInbox()">
                <i class="fas fa-th-large text-xl w-6 text-center"></i>
                <span class="nav-text">Inbox</span>
                <i id="arrow-icon" class="fas fa-chevron-down dropdown-arrow" onclick="event.stopPropagation(); toggleDropdown()"></i>
            </div>
            
            <div id="messenger-dropdown" class="hidden flex-col">
                <div class="dropdown-item p-3 pl-16 flex items-center gap-3 text-xs text-gray-500 hover:text-white cursor-pointer" onclick="filterContacts('telegram')">
                    <i class="fab fa-telegram w-4 text-[#26A5E4]"></i> Telegram
                </div>
                </div>

            <div id="bot-config-nav" class="nav-item" onclick="loadBotSettings()">
                <i class="fas fa-robot text-xl w-6 text-center"></i>
                <span class="nav-text">Bot Config</span>
            </div>
        </nav>

        <div class="mt-auto w-full">
            <div onclick="loadGeneralSettings()" class="nav-item" id="sidebar-settings">
                <i class="fas fa-cog text-xl w-6 text-center"></i>
                <span class="nav-text">Settings</span>
            </div>
        </div>
    </div>

    <div id="main-dashboard-content" class="flex flex-1 flex-col min-w-0">
        <div class="h-16 border-b flex items-center px-6 justify-between z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleLeftSidebar()" class="text-gray-500 hover:text-white lg:hidden"><i class="fas fa-bars"></i></button>
            </div>
            
            <div class="flex items-center space-x-3 cursor-pointer group">
                <div class="text-right hidden md:block">
                    <p id="top-admin-name" class="text-sm font-medium">Admin</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">System Admin</p>
                </div>
                <div class="relative">
                    <img id="top-admin-avatar" src="https://ui-avatars.com/api/?name=Admin" class="w-9 h-9 rounded-full border border-white/10 object-cover">
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <div id="chat-list-container" class="w-80 flex-shrink-0 flex flex-col border-r hidden md:flex">
                <div class="p-6 border-b flex justify-between items-center">
                    <h2 id="inbox-title" class="font-bold text-sm uppercase tracking-widest">Inbox</h2>
                    <span id="global-msg-count" class="hidden bg-accent-blue text-[10px] px-2 py-0.5 rounded-full text-white font-bold">0</span>
                </div>
                <div id="contact-list" class="flex-1 overflow-y-auto p-2">
                    <div id="contacts-container" class="space-y-1"></div>
                </div>
            </div>

            <div class="flex-1 flex flex-col relative min-w-0" style="background-color: var(--bg-pure-black);">
                <div class="h-16 border-b flex items-center px-6 justify-between">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div id="header-avatar-container" class="flex-shrink-0">
                            <img id="header-avatar-img" class="w-9 h-9 rounded-full hidden border object-cover">
                            <div id="header-avatar-text" class="w-9 h-9 rounded-full bg-accent-blue flex items-center justify-center font-bold text-xs text-white">?</div>
                        </div>
                        <div class="truncate">
                            <h3 id="chat-header-name" class="text-sm font-bold truncate">Select a chat</h3>
                            <p id="chat-status" class="text-[10px] text-gray-500 uppercase">Ready</p>
                        </div>
                    </div>
                    <button onclick="toggleRightPanel()" class="text-gray-500 hover:text-white p-2"><i class="fas fa-user-circle text-xl"></i></button>
                </div>

                <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 flex flex-col scroll-smooth"></div>

                <div class="p-4 md:p-6 border-t">
                    <div class="flex items-center gap-4 bg-black/20 border border-gray-800 rounded-2xl px-5 py-3">
                        <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)">
                        <i class="fas fa-paperclip text-gray-500 cursor-pointer" onclick="document.getElementById('file-input').click()"></i>
                        <input type="text" id="user-input" onkeypress="handleKeyPress(event)" placeholder="Reply here..." class="bg-transparent flex-1 outline-none text-sm">
                        <button onclick="sendMessage()" class="text-accent-blue"><i class="fas fa-paper-plane text-lg"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bot-settings-area" class="hidden flex-1 flex flex-col overflow-hidden">
        <iframe src="bot-config.html" id="settings-frame" class="w-full h-full border-none"></iframe>
    </div>

    <div id="right-panel" class="hidden w-80 border-l flex flex-col p-6 space-y-8 overflow-y-auto z-10">
        <div class="text-center space-y-4 pt-4">
            <div id="side-avatar-text" class="w-24 h-24 bg-accent-blue rounded-full mx-auto flex items-center justify-center text-3xl font-bold">?</div>
            <img id="side-avatar-img" class="w-24 h-24 rounded-full mx-auto hidden object-cover border-4 border-black">
            <input type="text" id="edit-nickname" onblur="updateNickname()" class="bg-transparent text-center font-bold text-lg outline-none w-full" placeholder="Nickname">
        </div>
        <textarea id="contact-note" onblur="saveNote()" class="w-full h-32 bg-black/40 border border-gray-800 rounded-xl p-4 text-xs outline-none" placeholder="Notes..."></textarea>
    </div>

    <script>
        const socket = io();
        let currentChatId = "";
        let allMessages = [];
        let cachedContacts = [];

        // ၁။ Appearance & Dark Mode Logic (New)
        async function applyAppearanceSettings() {
            try {
                const res = await fetch('/api/settings');
                const settings = await res.json();
                
                if (settings.dark_mode_enabled === 'true') {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            } catch (e) { console.error("Appearance load error:", e); }
        }

        async function loadSystemSettings() {
            try {
                const res = await fetch('/api/admin/profile');
                const data = await res.json();
                if (data.nickname) document.getElementById('top-admin-name').innerText = data.nickname;
                if (data.avatar) {
                    const url = (data.avatar.startsWith('data') || data.avatar.startsWith('http')) ? data.avatar : `/uploads/${data.avatar}`;
                    document.getElementById('top-admin-avatar').src = url;
                }
            } catch (e) { console.error("Profile load error:", e); }
        }

        // Sidebar & UI Handlers
        function toggleLeftSidebar() { document.getElementById('left-sidebar').classList.toggle('sidebar-collapsed'); }
        function toggleRightPanel() { document.getElementById('right-panel').classList.toggle('hidden'); }
        
        function switchToInbox() {
            document.getElementById('main-dashboard-content').classList.remove('hidden');
            document.getElementById('bot-settings-area').classList.add('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-nav'));
            document.getElementById('inbox-nav').classList.add('active-nav');
        }

        function loadBotSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('settings-frame').src = "bot-config.html";
        }

        function loadGeneralSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('settings-frame').src = "general-settings.html";
        }

        // Messaging Logic
        async function loadContacts() {
            const res = await fetch('/api/contacts');
            cachedContacts = await res.json();
            renderContacts(cachedContacts);
        }

        function renderContacts(contacts) {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            contacts.forEach(c => {
                const item = document.createElement('div');
                item.className = `p-3 rounded-xl flex items-center gap-3 cursor-pointer transition ${currentChatId === c.chat_id ? 'active-contact' : 'hover:bg-black/20'}`;
                item.onclick = () => selectContact(c);
                item.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold uppercase overflow-hidden">
                        ${c.profile_pic ? `<img src="${c.profile_pic}" class="w-full h-full object-cover">` : (c.nickname || "?").charAt(0)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate">${c.nickname || c.first_name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${c.platform}</p>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function selectContact(contact) {
            currentChatId = contact.chat_id;
            document.getElementById('chat-header-name').innerText = contact.nickname || contact.first_name;
            document.getElementById('edit-nickname').value = contact.nickname || contact.first_name;
            document.getElementById('contact-note').value = contact.notes || "";
            renderMessages();
            renderContacts(cachedContacts);
        }

        async function loadHistory() {
            const res = await fetch('/api/messages');
            allMessages = await res.json();
            if(currentChatId) renderMessages();
        }

        function renderMessages() {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            allMessages.filter(m => m.chat_id === currentChatId).forEach(msg => {
                const isBot = msg.sender_type === 'bot';
                const msgHtml = `
                    <div class="${isBot ? 'self-end bg-accent-blue' : 'self-start bg-gray-800'} p-3 rounded-2xl max-w-[75%] text-sm">
                        ${msg.text || ''}
                        ${msg.file_url ? `<img src="/uploads/${msg.file_url}" class="mt-2 rounded-lg max-w-full">` : ''}
                    </div>
                `;
                win.insertAdjacentHTML('beforeend', msgHtml);
            });
            win.scrollTop = win.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if(input.value.trim() && currentChatId) {
                socket.emit('send_reply', { chatId: currentChatId, text: input.value });
                input.value = "";
            }
        }

        socket.on('new_message', (data) => {
            allMessages.push(data);
            if(data.chat_id === currentChatId) renderMessages();
            else {
                document.getElementById('notif-sound').play().catch(()=>{});
                loadContacts();
            }
        });

        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }

        window.onload = () => {
            applyAppearanceSettings(); // Dark mode check
            loadSystemSettings();
            loadContacts();
            loadHistory();
        };
    </script>
</body>
</html>
