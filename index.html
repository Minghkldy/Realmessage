<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0a0a0a',
                        'border-gray': '#1f1f1f',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .active-contact { border-left: 3px solid #3B82F6; background-color: #0f0f0f; }
        
        #left-sidebar { 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 240px;
        }
        
        .sidebar-collapsed { width: 80px !important; }
        .sidebar-collapsed .nav-text, 
        .sidebar-collapsed .dropdown-arrow,
        .sidebar-collapsed #messenger-dropdown { display: none !important; }
        .sidebar-collapsed .nav-item { justify-content: center; padding: 12px 0; }
        .sidebar-collapsed .text-2xl { padding-left: 0; text-align: center; }

        .nav-item { 
            display: flex; align-items: center; gap: 16px; width: 100%; 
            padding: 12px 24px; cursor: pointer; transition: 0.2s; color: #6b7280;
        }
        .nav-item:hover { color: white; background-color: rgba(255,255,255,0.05); }
        .nav-text { font-size: 14px; font-weight: 500; white-space: nowrap; }
        .active-nav { color: #3B82F6; background-color: rgba(59, 130, 246, 0.05); }

        #messenger-dropdown { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0,0,0,0.1); }
        #messenger-dropdown.show { max-height: 400px; }
        .dropdown-item { padding-left: 64px; padding-top: 10px; padding-bottom: 10px; display: flex; align-items: center; gap: 12px; color: #6b7280; transition: 0.2s; cursor: pointer; }
        .dropdown-item:hover { color: white; }
        .dropdown-arrow { transition: transform 0.3s; margin-left: auto; font-size: 10px; }
        .rotate-arrow { transform: rotate(180deg); }

        .noti-badge { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        @keyframes ring {
            0% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-15deg); }
            30% { transform: rotate(10deg); }
            40% { transform: rotate(-10deg); }
            50% { transform: rotate(5deg); }
            60% { transform: rotate(-5deg); }
            100% { transform: rotate(0); }
        }
        .ring-animation { display: inline-block; animation: ring 0.5s ease infinite; }

        #imagePreviewModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #imagePreviewModal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; cursor: default; }
    </style>
</head>
<body class="h-full flex overflow-hidden bg-pure-black">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="imagePreviewModal" onclick="closeImagePreview()">
        <img id="previewImg" src="" onclick="event.stopPropagation()">
    </div>

    <div id="left-sidebar" class="flex-shrink-0 flex flex-col border-r border-border-gray py-6 bg-dark-gray">
        <div class="text-2xl font-bold text-accent-blue px-6 mb-10 cursor-pointer flex items-center" onclick="toggleLeftSidebar()">
            <i class="fas fa-robot w-6 text-center"></i>
            <span class="nav-text ml-3">OmniBot</span>
        </div>
        
        <nav class="flex flex-col w-full">
            <div class="w-full">
                <div class="nav-item active-nav" id="inbox-nav" onclick="switchToInbox()">
                    <i class="fas fa-th-large text-xl w-6 text-center"></i>
                    <span class="nav-text">Inbox</span>
                    <i id="arrow-icon" class="fas fa-chevron-down dropdown-arrow" onclick="event.stopPropagation(); toggleDropdown()"></i>
                </div>
                
                <div id="messenger-dropdown" class="hidden flex-col">
                    <div class="dropdown-item" onclick="filterContacts('messenger')">
                        <i class="fab fa-facebook-messenger w-4 text-[#0084FF]"></i>
                        <span class="text-xs">Messenger</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('instagram')">
                        <i class="fab fa-instagram w-4 text-[#E4405F]"></i>
                        <span class="text-xs">Instagram</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('telegram')">
                        <i class="fab fa-telegram w-4 text-[#26A5E4]"></i>
                        <span class="text-xs">Telegram</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('whatsapp')">
                        <i class="fab fa-whatsapp w-4 text-[#25D366]"></i>
                        <span class="text-xs">WhatsApp</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('viber')">
                        <i class="fab fa-viber w-4 text-[#7360f2]"></i>
                        <span class="text-xs">Viber</span>
                    </div>
                </div>
            </div>

            <div id="bot-config-nav" class="nav-item" onclick="loadBotSettings()">
                <i class="fas fa-robot text-xl w-6 text-center"></i>
                <span class="nav-text">Bot Config</span>
            </div>
        </nav>

        <div class="mt-auto w-full">
            <div onclick="loadBotSettings()" class="nav-item" id="sidebar-settings">
                <i class="fas fa-cog text-xl w-6 text-center"></i>
                <span class="nav-text">Settings</span>
            </div>
        </div>
    </div>

    <div id="main-dashboard-content" class="flex flex-1">
        <div id="chat-list-container" class="w-80 flex-shrink-0 flex flex-col border-r border-border-gray bg-pure-black">
            <div class="p-6 border-b border-border-gray flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <button onclick="toggleLeftSidebar()" class="text-gray-500 hover:text-white transition">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <h2 id="inbox-title" class="font-bold text-sm uppercase tracking-widest">Inbox</h2>
                        <i id="noti-bell" class="fas fa-bell text-gray-500 hidden text-xs"></i>
                    </div>
                </div>
                <span id="global-msg-count" class="hidden bg-accent-blue text-[10px] px-2 py-0.5 rounded-full text-white noti-badge">0</span>
            </div>
            <div id="contact-list" class="flex-1 overflow-y-auto p-2">
                <div id="contacts-container" class="space-y-1"></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-pure-black relative">
            <div class="h-16 border-b border-border-gray flex items-center px-6 justify-between bg-pure-black">
                <div class="flex items-center gap-3">
                    <img id="header-avatar-img" class="w-9 h-9 rounded-full hidden border border-border-gray" src="">
                    <div id="header-avatar-text" class="w-9 h-9 rounded-full bg-accent-blue flex items-center justify-center font-bold text-xs">?</div>
                    <div>
                        <h3 id="chat-header-name" class="text-sm font-bold">Select a chat</h3>
                        <p id="chat-status" class="text-[10px] text-gray-600 uppercase">System Ready</p>
                    </div>
                </div>
                <button onclick="toggleRightPanel()" class="text-gray-500 hover:text-white transition p-2">
                    <i class="fas fa-user-circle text-xl"></i>
                </button>
            </div>

            <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col"></div>

            <div class="p-6 border-t border-border-gray bg-pure-black">
                <div class="flex items-center gap-4 bg-dark-gray border border-border-gray rounded-2xl px-5 py-3 focus-within:border-accent-blue transition">
                    <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)" accept="image/*,video/*,audio/*">
                    <i class="fas fa-paperclip text-gray-500 cursor-pointer hover:text-white" onclick="document.getElementById('file-input').click()"></i>
                    <input type="text" id="user-input" onkeypress="handleKeyPress(event)" placeholder="Reply here..." class="bg-transparent flex-1 outline-none text-sm text-white">
                    <button onclick="sendMessage()" class="text-accent-blue hover:scale-110 transition">
                        <i class="fas fa-paper-plane text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="bot-settings-area" class="hidden flex-1 flex flex-col bg-pure-black overflow-hidden">
        <iframe src="settings.html" id="settings-frame" class="w-full h-full border-none"></iframe>
    </div>

    <div id="right-panel" class="hidden w-80 border-l border-border-gray bg-dark-gray flex flex-col p-6 space-y-8 overflow-y-auto">
        <div class="text-center space-y-4 pt-4">
            <div class="relative inline-block">
                <div id="side-avatar-text" class="w-24 h-24 bg-accent-blue rounded-full mx-auto flex items-center justify-center text-3xl font-bold border-4 border-pure-black">?</div>
                <img id="side-avatar-img" class="w-24 h-24 rounded-full mx-auto border-4 border-pure-black hidden object-cover" src="">
            </div>
            <div>
                <input type="text" id="edit-nickname" onblur="updateNickname()" class="bg-transparent text-center font-bold text-lg outline-none focus:border-b border-accent-blue w-full p-1" placeholder="Nickname">
                <p id="side-platform" class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">Platform: -</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="space-y-3">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest flex items-center gap-2">
                    <i class="fas fa-sticky-note text-accent-blue"></i> Internal Notes
                </label>
                <textarea id="contact-note" onblur="saveNote()" class="w-full h-32 bg-pure-black border border-border-gray rounded-xl p-4 text-xs outline-none focus:border-accent-blue resize-none text-gray-300" placeholder="Add private details..."></textarea>
            </div>

            <div class="pt-6 border-t border-border-gray space-y-3">
                <button onclick="toggleBlock()" class="w-full py-3 bg-red-900/10 text-red-500 rounded-xl text-[11px] font-bold hover:bg-red-900/30 transition flex items-center justify-center gap-2">
                    <i class="fas fa-ban"></i> BLOCK CUSTOMER
                </button>
                <button onclick="deleteContact()" class="w-full py-3 border border-border-gray text-gray-500 rounded-xl text-[11px] font-bold hover:bg-white/5 hover:text-red-400 transition flex items-center justify-center gap-2">
                    <i class="fas fa-trash-alt"></i> DELETE CONVERSATION
                </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentChatId = "";
        let allMessages = [];
        let unreadCounts = {};
        let cachedContacts = []; 

        function toggleLeftSidebar() { 
            const sidebar = document.getElementById('left-sidebar');
            sidebar.classList.toggle('sidebar-collapsed'); 
            
            if(sidebar.classList.contains('sidebar-collapsed')) {
                const dropdown = document.getElementById('messenger-dropdown');
                dropdown.classList.remove('show');
                setTimeout(() => dropdown.classList.add('hidden'), 300);
                document.getElementById('arrow-icon').classList.remove('rotate-arrow');
            }
        }
        
        function toggleRightPanel() { document.getElementById('right-panel').classList.toggle('hidden'); }
        
        function toggleDropdown() {
            const sidebar = document.getElementById('left-sidebar');
            if(sidebar.classList.contains('sidebar-collapsed')) return;

            const dropdown = document.getElementById('messenger-dropdown');
            const arrow = document.getElementById('arrow-icon');

            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                dropdown.classList.add('flex');
                setTimeout(() => dropdown.classList.add('show'), 10);
            } else {
                dropdown.classList.remove('show');
                setTimeout(() => {
                    dropdown.classList.remove('flex');
                    dropdown.classList.add('hidden');
                }, 300);
            }
            arrow.classList.toggle('rotate-arrow');
        }

        function switchToInbox() {
            document.getElementById('main-dashboard-content').classList.remove('hidden');
            document.getElementById('bot-settings-area').classList.add('hidden');
            document.getElementById('inbox-nav').classList.add('active-nav');
            document.getElementById('bot-config-nav').classList.remove('active-nav');
            filterContacts('all');
        }

        function loadBotSettings() {
            document.getElementById('main-dashboard-content').classList.add('hidden');
            document.getElementById('bot-settings-area').classList.remove('hidden');
            document.getElementById('right-panel').classList.add('hidden');
            document.getElementById('inbox-nav').classList.remove('active-nav');
            document.getElementById('bot-config-nav').classList.add('active-nav');
            const dropdown = document.getElementById('messenger-dropdown');
            dropdown.classList.remove('show');
            dropdown.classList.add('hidden');
        }

        function showImagePreview(url) {
            const modal = document.getElementById('imagePreviewModal');
            const img = document.getElementById('previewImg');
            img.src = url;
            modal.style.display = 'flex';
        }

        function closeImagePreview() {
            document.getElementById('imagePreviewModal').style.display = 'none';
        }

        async function loadContacts() {
            try {
                const res = await fetch('/api/contacts');
                cachedContacts = await res.json();
                renderContacts(cachedContacts);
            } catch (err) { console.error(err); }
        }

        function filterContacts(platform) {
            let filtered;
            const title = document.getElementById('inbox-title');
            if (platform === 'all') {
                filtered = cachedContacts;
                title.innerText = "Inbox";
            } else {
                filtered = cachedContacts.filter(c => c.platform.toLowerCase() === platform.toLowerCase());
                title.innerText = platform.toUpperCase();
            }
            renderContacts(filtered);
        }

        function renderContacts(contacts) {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';
            contacts.forEach(c => {
                const count = unreadCounts[c.chat_id] || 0;
                const item = document.createElement('div');
                item.className = `p-3 rounded-xl flex items-center gap-3 cursor-pointer transition hover:bg-dark-gray ${currentChatId === c.chat_id ? 'active-contact' : ''}`;
                item.onclick = () => selectContact(c);
                const avatar = c.profile_pic ? `<img src="${c.profile_pic}" class="w-10 h-10 rounded-full object-cover border border-border-gray">` : `<div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center text-xs font-bold border border-border-gray">${(c.nickname || c.first_name).charAt(0)}</div>`;
                item.innerHTML = `
                    ${avatar}
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate ${count > 0 ? 'text-white' : 'text-gray-400'}">${c.nickname || c.first_name}</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-tighter">${c.platform}</p>
                    </div>
                    ${count > 0 ? `<span class="bg-accent-blue text-[10px] w-5 h-5 flex items-center justify-center rounded-full text-white noti-badge font-bold">${count}</span>` : ''}
                `;
                container.appendChild(item);
            });
            updateGlobalBadge();
        }

        function selectContact(contact) {
            currentChatId = contact.chat_id;
            unreadCounts[currentChatId] = 0;
            const displayName = contact.nickname || contact.first_name;
            document.getElementById('chat-header-name').innerText = displayName;
            document.getElementById('edit-nickname').value = displayName;
            document.getElementById('contact-note').value = contact.notes || "";
            document.getElementById('side-platform').innerText = `Platform: ${contact.platform}`;
            const hImg = document.getElementById('header-avatar-img');
            const hTxt = document.getElementById('header-avatar-text');
            const sImg = document.getElementById('side-avatar-img');
            const sTxt = document.getElementById('side-avatar-text');
            if(contact.profile_pic) {
                hImg.src = contact.profile_pic; hImg.classList.remove('hidden'); hTxt.classList.add('hidden');
                sImg.src = contact.profile_pic; sImg.classList.remove('hidden'); sTxt.classList.add('hidden');
            } else {
                const initial = displayName.charAt(0);
                hTxt.innerText = initial; hTxt.classList.remove('hidden'); hImg.classList.add('hidden');
                sTxt.innerText = initial; sTxt.classList.remove('hidden'); sImg.classList.add('hidden');
            }
            document.getElementById('chat-status').innerText = `${contact.platform} ACTIVE`;
            document.getElementById('chat-status').className = "text-[10px] text-green-500 uppercase font-bold";
            renderContacts(cachedContacts); 
            renderMessages();
        }

        function updateGlobalBadge() {
            const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
            const badge = document.getElementById('global-msg-count');
            const bell = document.getElementById('noti-bell');
            if (total > 0) {
                badge.innerText = total; badge.classList.remove('hidden');
                bell.classList.remove('hidden'); bell.classList.add('ring-animation', 'text-yellow-400');
            } else {
                badge.classList.add('hidden'); bell.classList.add('hidden');
                bell.classList.remove('ring-animation', 'text-yellow-400');
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/messages');
                allMessages = await response.json();
                if(currentChatId) renderMessages();
            } catch (err) { console.error(err); }
        }

        function renderMessages() {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            const filtered = allMessages.filter(m => m.chat_id === currentChatId);
            filtered.forEach(msg => appendMessage(msg, msg.sender_type === 'bot'));
        }

        function appendMessage(data, isBot) {
            const win = document.getElementById('chat-window');
            let contentHtml = data.text || "";
            const mediaUrl = data.file_url || data.fileUrl;
            const mediaType = data.file_type || data.fileType || "";
            if (mediaUrl) {
                if (mediaType.includes('image') || mediaUrl.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                    contentHtml = `<img src="${mediaUrl}" class="max-w-xs rounded-lg mt-2 cursor-pointer border border-border-gray shadow-md" onclick="showImagePreview('${mediaUrl}')">`;
                } else if (mediaType.includes('video')) {
                    contentHtml = `<video controls class="max-w-xs rounded-lg mt-2 border border-border-gray shadow-md"><source src="${mediaUrl}"></video>`;
                } else if (mediaType.includes('audio')) {
                    contentHtml = `<audio controls class="mt-2 w-full max-w-[200px]"><source src="${mediaUrl}"></audio>`;
                }
                if(data.text && !data.text.includes("Sent a")) contentHtml = `<p class="mb-2">${data.text}</p>` + contentHtml;
            }
            const msgHtml = isBot ? `
                <div class="self-end max-w-[70%]">
                    <div class="bg-accent-blue p-4 rounded-2xl rounded-tr-none text-sm font-medium shadow-lg">${contentHtml}</div>
                    <p class="text-[9px] text-gray-600 mt-2 text-right uppercase">Sent</p>
                </div>
            ` : `
                <div class="flex items-start gap-3 max-w-[70%]">
                    <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 border border-border-gray bg-gray-900 flex items-center justify-center text-[10px]">
                        ${data.profile_pic ? `<img src="${data.profile_pic}" class="w-full h-full object-cover">` : `<i class="fas fa-user text-gray-500"></i>`}
                    </div>
                    <div class="bg-dark-gray border border-border-gray p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed">
                        <p class="text-[10px] text-sky-400 mb-1 font-bold">${data.sender || 'User'}</p>${contentHtml}
                    </div>
                </div>
            `;
            win.insertAdjacentHTML('beforeend', msgHtml);
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentChatId) return alert("Select a chat first!");
            const formData = new FormData();
            formData.append('file', file);
            formData.append('chatId', currentChatId);
            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                if (response.ok) event.target.value = ""; else alert("Upload failed!");
            } catch (err) { alert("Error connecting to server."); }
        }

        socket.on('new_message', (data) => {
            const senderId = data.chat_id || data.chatId;
            if (!allMessages.some(m => m.id === data.id && data.id !== undefined)) {
                allMessages.push(data);
                if (currentChatId === senderId) appendMessage(data, data.sender_type === 'bot');
                else {
                    unreadCounts[senderId] = (unreadCounts[senderId] || 0) + 1;
                    document.getElementById('notif-sound').play().catch(() => {});
                    renderContacts(cachedContacts);
                }
            }
        });

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(text !== "" && currentChatId !== "") {
                socket.emit('send_reply', { chatId: currentChatId, text: text });
                input.value = ""; unreadCounts[currentChatId] = 0;
            } else if (!currentChatId) alert("Please select a contact first.");
        }

        async function updateNickname() {
            if (!currentChatId) return;
            const newName = document.getElementById('edit-nickname').value;
            await fetch('/api/contacts/nickname', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chatId: currentChatId, nickname: newName }) });
            loadContacts();
        }

        async function saveNote() {
            if (!currentChatId) return;
            const noteValue = document.getElementById('contact-note').value;
            await fetch('/api/contacts/note', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chatId: currentChatId, note: noteValue }) });
        }

        async function toggleBlock() {
            if (!currentChatId || !confirm("Block this customer?")) return;
            await fetch('/api/contacts/block', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chatId: currentChatId }) });
            location.reload();
        }

        async function deleteContact() {
            if (!currentChatId || !confirm("Delete this conversation?")) return;
            await fetch(`/api/contacts/${currentChatId}`, { method: 'DELETE' });
            location.reload();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
        window.onload = () => { loadContacts(); loadHistory(); };
    </script>
</body>
</html>
