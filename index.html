<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Total Black Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0a0a0a',
                        'border-gray': '#1f1f1f',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .active-contact { border-left: 3px solid #3B82F6; background-color: #0f0f0f; }
    </style>
</head>
<body class="h-full flex overflow-hidden">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div class="w-80 flex-shrink-0 flex flex-col border-r border-border-gray bg-pure-black">
        <div class="p-6 text-xl font-bold border-b border-border-gray flex items-center gap-2">
            <i class="fas fa-robot text-accent-blue"></i> OmniBot
        </div>

        <nav class="p-4 border-b border-border-gray space-y-1">
            <div class="p-3 rounded-lg bg-dark-gray flex items-center justify-between text-sm cursor-pointer">
                <span class="flex items-center gap-3"><i class="fas fa-th-large text-gray-500"></i> All Messages</span>
                <span id="msg-count" class="bg-accent-blue text-[10px] px-2 py-0.5 rounded-full">0</span>
            </div>
            <div class="p-3 rounded-lg hover:bg-dark-gray flex items-center gap-3 text-sm text-gray-400 cursor-pointer transition">
                <i class="fab fa-telegram text-sky-500"></i> Telegram
            </div>
            <div class="p-3 rounded-lg hover:bg-dark-gray flex items-center gap-3 text-sm text-gray-400 cursor-pointer transition">
                <i class="fab fa-viber text-purple-500"></i> Viber
            </div>
        </nav>

        <div id="contact-list" class="flex-1 overflow-y-auto px-2 py-4">
            <p class="px-4 text-[10px] uppercase tracking-widest text-gray-600 font-bold mb-4">Contacts</p>
            <div id="contacts-container"></div>
        </div>

        <div class="p-4 border-t border-border-gray text-[10px] text-gray-600 text-center uppercase tracking-widest">
            Connected to Render & GitHub
        </div>
    </div>

    <div class="flex-1 flex flex-col bg-pure-black">
        <div class="h-16 border-b border-border-gray flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div id="header-avatar" class="w-9 h-9 rounded-full bg-accent-blue flex items-center justify-center font-bold text-xs">?</div>
                <div>
                    <h3 id="chat-header-name" class="text-sm font-bold">Waiting for message...</h3>
                    <p id="chat-status" class="text-[10px] text-gray-500 uppercase tracking-tighter">System Ready</p>
                </div>
            </div>
            <div class="flex gap-5 text-gray-500 text-sm">
                <i class="fas fa-search hover:text-white cursor-pointer transition"></i>
                <i class="fas fa-ellipsis-v hover:text-white cursor-pointer transition"></i>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col"></div>

        <div class="p-6 bg-pure-black border-t border-border-gray">
            <div class="flex items-center gap-4 bg-dark-gray border border-border-gray rounded-2xl px-5 py-3 focus-within:border-accent-blue transition">
                <i class="fas fa-paperclip text-gray-500 cursor-pointer hover:text-white"></i>
                <input type="text" id="user-input" onkeypress="handleKeyPress(event)" placeholder="မက်ဆေ့ချ် ရေးရန်..." class="bg-transparent flex-1 outline-none text-sm">
                <button onclick="sendMessage()" class="text-accent-blue hover:scale-110 transition active:scale-95">
                    <i class="fas fa-paper-plane text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const chatWindow = document.getElementById('chat-window');
        const notifSound = document.getElementById('notif-sound');
        let currentChatId = "";

        // --- ၁။ Message ပြသသည့် Function (isReply ပေါ်မူတည်ပြီး ဘယ်/ညာ ခွဲပြရန်) ---
        function appendMessage(data, isReply = false) {
            // Database ကလာရင် sender_type ကိုကြည့်မယ်၊ Real-time ဆိုရင် isReply ကိုကြည့်မယ်
            const isBot = (data.sender_type === 'bot' || isReply === true);
            
            const msgHtml = isBot ? `
                <div class="self-end max-w-[70%]">
                    <div class="bg-accent-blue p-4 rounded-2xl rounded-tr-none text-sm font-medium leading-relaxed">
                        ${data.text}
                    </div>
                    <p class="text-[9px] text-gray-600 mt-2 text-right uppercase">Sent</p>
                </div>
            ` : `
                <div class="flex items-start gap-3 max-w-[70%]">
                    <div class="w-8 h-8 rounded-full bg-gray-900 flex-shrink-0 flex items-center justify-center border border-border-gray">
                        <i class="fab fa-telegram text-sky-500 text-xs"></i>
                    </div>
                    <div class="bg-dark-gray border border-border-gray p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed">
                        <p class="text-[10px] text-sky-400 mb-1 font-bold">${data.sender || 'User'}</p>
                        ${data.text}
                    </div>
                </div>
            `;
            chatWindow.innerHTML += msgHtml;
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        // --- ၂။ Database ကစာဟောင်းများကို ဆွဲထုတ်ခြင်း ---
        async function loadHistory() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                document.getElementById('msg-count').innerText = messages.length;
                
                chatWindow.innerHTML = ""; // Refresh တိုင်း အဟောင်းတွေအရင်ရှင်းမယ်

                if (messages.length > 0) {
                    messages.forEach(msg => {
                        // sender_type က 'bot' ဖြစ်ရင် ညာဘက်မှာပြမယ် (isReply = true)
                        appendMessage(msg, msg.sender_type === 'bot');
                    });
                    
                    // Header UI ကို နောက်ဆုံးစာပို့ထားသူရဲ့ အချက်အလက်နဲ့ update လုပ်မယ်
                    const lastUserMsg = [...messages].reverse().find(m => m.sender_type !== 'bot');
                    if (lastUserMsg) {
                        updateUI(lastUserMsg);
                    }
                }
            } catch (err) {
                console.log("History Load Error:", err);
            }
        }

        function updateUI(data) {
            currentChatId = data.chatId || data.chat_id;
            document.getElementById('chat-header-name').innerText = data.sender || "User";
            document.getElementById('header-avatar').innerText = (data.sender || "U").charAt(0);
            document.getElementById('chat-status').innerText = "Telegram Active";
            document.getElementById('chat-status').classList.replace('text-gray-500', 'text-green-500');
        }

        // --- ၃။ စာအသစ်ဝင်လာခြင်း (Telegram) ---
        socket.on('new_message', (data) => {
            notifSound.play().catch(e => {});
            updateUI(data);
            appendMessage(data, false); // အဝင်စာမို့လို့ false
        });

        // --- ၄။ စာပြန်ပို့ခြင်း ---
        function sendMessage() {
            const input = document.getElementById('user-input');
            if(input.value.trim() !== "" && currentChatId !== "") {
                const text = input.value;
                socket.emit('send_reply', {
                    chatId: currentChatId,
                    text: text
                });
                appendMessage({ text: text }, true); // ကိုယ်ပို့တဲ့စာမို့လို့ true (ညာဘက်မှာပြမယ်)
                input.value = "";
            } else if (currentChatId === "") {
                alert("စာပြန်ရန် Chat တစ်ခုကို အရင်စောင့်ပါ သို့မဟုတ် ရွေးချယ်ပါ။");
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
