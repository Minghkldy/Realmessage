<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniChat Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; }
        .sidebar { background-color: #111111; border-right: 1px solid #333; }
        .chat-area { background-color: #0a0a0a; }
        .message-box { background-color: #1a1a1a; border: 1px solid #333; }
        .active-chat { background-color: #222; border-left: 4px solid #3b82f6; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div class="sidebar w-64 flex-shrink-0 flex flex-col">
        <div class="p-6 text-xl font-bold border-b border-gray-800 flex items-center gap-2">
            <i class="fas fa-robot text-blue-500"></i> OmniBot
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <div class="p-3 rounded-lg active-chat cursor-pointer flex items-center justify-between">
                <span>All Messages</span>
                <span class="bg-blue-600 text-xs px-2 py-1 rounded-full">5</span>
            </div>
            <div class="p-3 rounded-lg hover:bg-zinc-900 cursor-pointer flex items-center gap-3">
                <i class="fab fa-telegram text-sky-400"></i> Telegram
            </div>
            <div class="p-3 rounded-lg hover:bg-zinc-900 cursor-pointer flex items-center gap-3">
                <i class="fab fa-viber text-purple-500"></i> Viber
            </div>
        </nav>
        <div class="p-4 border-t border-gray-800 text-sm text-gray-500 text-center">
            Connected to GitHub
        </div>
    </div>

    <div class="flex-1 flex flex-col chat-area">
        <div class="h-16 border-b border-gray-800 flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">U</div>
                <div>
                    <h3 class="font-medium">User Name</h3>
                    <p class="text-xs text-green-500">Online</p>
                </div>
            </div>
            <div class="flex gap-4 text-gray-400">
                <i class="fas fa-search cursor-pointer"></i>
                <i class="fas fa-ellipsis-v cursor-pointer"></i>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
            <div class="max-w-xs p-3 rounded-lg bg-zinc-800 self-start text-sm">
                <p class="text-xs text-blue-400 mb-1">Telegram</p>
                မင်္ဂလာပါ၊ ဈေးနှုန်းလေး သိချင်လို့ပါ။
            </div>
            <div class="max-w-xs p-3 rounded-lg bg-blue-700 self-end text-sm">
                ဟုတ်ကဲ့ပါခင်ဗျာ၊ ဘယ် Product အမျိုးအစားကို စိတ်ဝင်စားပါသလဲ?
            </div>
        </div>

        <div class="p-4 border-t border-gray-800 bg-black">
            <div class="flex items-center gap-3 bg-zinc-900 rounded-full px-4 py-2 border border-gray-700">
                <i class="fas fa-paperclip text-gray-400 cursor-pointer"></i>
                <input type="text" id="user-input" placeholder="စာရိုက်ပါ..." class="bg-transparent flex-1 outline-none text-sm">
                <button onclick="sendMessage()" class="bg-blue-600 p-2 rounded-full hover:bg-blue-500 transition">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            if(input.value.trim() !== "") {
                const msg = `<div class="max-w-xs p-3 rounded-lg bg-blue-700 self-end text-sm">
                                ${input.value}
                             </div>`;
                chatWindow.innerHTML += msg;
                input.value = "";
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }
    </script>
</body>
</html>
