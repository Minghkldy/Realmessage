<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0a0a0a',
                        'border-gray': '#1f1f1f',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex overflow-hidden bg-pure-black">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="imagePreviewModal" onclick="closeImagePreview()">
        <img id="previewImg" src="" onclick="event.stopPropagation()">
    </div>

    <div id="left-sidebar" class="flex-shrink-0 flex flex-col border-r border-border-gray py-6 bg-dark-gray z-20">
        <div class="text-2xl font-bold text-accent-blue px-6 mb-10 cursor-pointer flex items-center" onclick="toggleLeftSidebar()">
            <i class="fas fa-robot w-6 text-center"></i>
            <span class="nav-text ml-3">OmniBot</span>
        </div>
        
        <nav class="flex flex-col w-full flex-1">
            <div class="w-full">
                <div class="nav-item active-nav" id="inbox-nav" onclick="switchToInbox()">
                    <i class="fas fa-th-large text-xl w-6 text-center"></i>
                    <span class="nav-text">Inbox</span>
                    <i id="arrow-icon" class="fas fa-chevron-down dropdown-arrow" onclick="event.stopPropagation(); toggleDropdown()"></i>
                </div>
                
                <div id="messenger-dropdown" class="hidden flex-col">
                    <div class="dropdown-item" onclick="filterContacts('messenger')">
                        <i class="fab fa-facebook-messenger w-4 text-[#0084FF]"></i>
                        <span class="text-xs">Messenger</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('instagram')">
                        <i class="fab fa-instagram w-4 text-[#E4405F]"></i>
                        <span class="text-xs">Instagram</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('telegram')">
                        <i class="fab fa-telegram w-4 text-[#26A5E4]"></i>
                        <span class="text-xs">Telegram</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('whatsapp')">
                        <i class="fab fa-whatsapp w-4 text-[#25D366]"></i>
                        <span class="text-xs">WhatsApp</span>
                    </div>
                    <div class="dropdown-item" onclick="filterContacts('viber')">
                        <i class="fab fa-viber w-4 text-[#7360f2]"></i>
                        <span class="text-xs">Viber</span>
                    </div>
                </div>
            </div>

            <div id="bot-config-nav" class="nav-item" onclick="loadBotSettings()">
                <i class="fas fa-robot text-xl w-6 text-center"></i>
                <span class="nav-text">Bot Config</span>
            </div>

            <div id="broadcast-nav" class="nav-item" onclick="loadBroadcastSettings()">
                <i class="fas fa-bullhorn text-xl w-6 text-center"></i>
                <span class="nav-text">Bulk Messaging</span>
            </div>
        </nav>

        <div class="mt-auto w-full">
            <div onclick="loadGeneralSettings()" class="nav-item" id="sidebar-settings">
                <i class="fas fa-cog text-xl w-6 text-center"></i>
                <span class="nav-text">Settings</span>
            </div>
        </div>
    </div>

    <div id="main-dashboard-content" class="flex flex-1 flex-col min-w-0">
        <div class="h-16 border-b border-border-gray flex items-center px-6 justify-between bg-dark-gray z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleLeftSidebar()" class="text-gray-500 hover:text-white transition lg:hidden">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="flex items-center space-x-3 cursor-pointer group">
                <div class="text-right hidden md:block">
                    <p id="top-admin-name" class="text-sm font-medium text-white">Admin</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">System Admin</p>
                </div>
                <div class="relative">
                    <img id="top-admin-avatar" src="https://ui-avatars.com/api/?name=Admin&background=random" 
                         class="w-9 h-9 rounded-full border border-white/10 object-cover">
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-pure-black rounded-full"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <div id="chat-list-container" class="w-80 flex-shrink-0 flex flex-col border-r border-border-gray bg-pure-black hidden md:flex">
                <div class="p-6 border-b border-border-gray flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <h2 id="inbox-title" class="font-bold text-sm uppercase tracking-widest">Inbox</h2>
                        <i id="noti-bell" class="fas fa-bell text-gray-500 hidden text-xs"></i>
                    </div>
                    <span id="global-msg-count" class="hidden bg-accent-blue text-[10px] px-2 py-0.5 rounded-full text-white noti-badge font-bold">0</span>
                </div>
                <div id="contact-list" class="flex-1 overflow-y-auto p-2">
                    <div id="contacts-container" class="space-y-1"></div>
                </div>
            </div>

            <div class="flex-1 flex flex-col bg-pure-black relative min-w-0">
                <div class="h-16 border-b border-border-gray flex items-center px-6 justify-between bg-pure-black">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div id="header-avatar-container" class="flex-shrink-0">
                            <img id="header-avatar-img" class="w-9 h-9 rounded-full hidden border border-border-gray object-cover" src="">
                            <div id="header-avatar-text" class="w-9 h-9 rounded-full bg-accent-blue flex items-center justify-center font-bold text-xs uppercase text-white">?</div>
                        </div>
                        <div class="truncate">
                            <h3 id="chat-header-name" class="text-sm font-bold truncate">Select a chat</h3>
                            <p id="chat-status" class="text-[10px] text-gray-600 uppercase">System Ready</p>
                        </div>
                    </div>
                    <button onclick="toggleRightPanel()" class="text-gray-500 hover:text-white transition p-2 flex-shrink-0">
                        <i class="fas fa-user-circle text-xl"></i>
                    </button>
                </div>

                <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 flex flex-col scroll-smooth"></div>

                <div class="p-4 md:p-6 border-t border-border-gray bg-pure-black">
                    <div class="flex items-center gap-4 bg-dark-gray border border-border-gray rounded-2xl px-5 py-3 focus-within:border-accent-blue transition">
                        <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)" accept="image/*,video/*,audio/*">
                        <i class="fas fa-paperclip text-gray-500 cursor-pointer hover:text-white" onclick="document.getElementById('file-input').click()"></i>
                        <input type="text" id="user-input" onkeypress="handleKeyPress(event)" placeholder="Reply here..." class="bg-transparent flex-1 outline-none text-sm text-white min-w-0">
                        <button onclick="sendMessage()" class="text-accent-blue hover:scale-110 transition flex-shrink-0">
                            <i class="fas fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bot-settings-area" class="hidden flex-1 flex flex-col bg-pure-black overflow-hidden">
        <iframe src="bot-config.html" id="settings-frame" class="w-full h-full border-none"></iframe>
    </div>

    <div id="right-panel" class="hidden w-80 border-l border-border-gray bg-dark-gray flex flex-col p-6 space-y-8 overflow-y-auto z-10">
        <div class="text-center space-y-4 pt-4">
            <div class="relative inline-block">
                <div id="side-avatar-text" class="w-24 h-24 bg-accent-blue rounded-full mx-auto flex items-center justify-center text-3xl font-bold border-4 border-pure-black uppercase">?</div>
                <img id="side-avatar-img" class="w-24 h-24 rounded-full mx-auto border-4 border-pure-black hidden object-cover" src="">
            </div>
            <div>
                <input type="text" id="edit-nickname" onblur="updateNickname()" class="bg-transparent text-center font-bold text-lg outline-none focus:border-b border-accent-blue w-full p-1" placeholder="Nickname">
                <p id="side-platform" class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">Platform: -</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="space-y-3">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest flex items-center gap-2">
                    <i class="fas fa-sticky-note text-accent-blue"></i> Internal Notes
                </label>
                <textarea id="contact-note" onblur="saveNote()" class="w-full h-32 bg-pure-black border border-border-gray rounded-xl p-4 text-xs outline-none focus:border-accent-blue resize-none text-gray-300" placeholder="Add private details..."></textarea>
            </div>

            <div class="pt-6 border-t border-border-gray space-y-3">
                <button onclick="toggleBlock()" class="w-full py-3 bg-red-900/10 text-red-500 rounded-xl text-[11px] font-bold hover:bg-red-900/30 transition flex items-center justify-center gap-2">
                    <i class="fas fa-ban"></i> BLOCK CUSTOMER
                </button>
                <button onclick="deleteContact()" class="w-full py-3 border border-border-gray text-gray-500 rounded-xl text-[11px] font-bold hover:bg-white/5 hover:text-red-400 transition flex items-center justify-center gap-2">
                    <i class="fas fa-trash-alt"></i> DELETE CONVERSATION
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
