<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Messaging - OmniBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Background ကို အနက်ရောင်ပြောင်းထားသည့်အပိုင်း */
        body { 
            background-color: #0b0e11; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }

        /* Card ကို Dark Look ပြောင်းထားသည့်အပိုင်း */
        .broadcast-card { 
            max-width: 700px; 
            margin: 50px auto; 
            border: 1px solid #333; 
            border-radius: 15px; 
            background-color: #161b22;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .card-header { 
            background: #007bff; 
            color: white; 
            border-radius: 15px 15px 0 0 !important; 
            padding: 20px; 
            border-bottom: 1px solid #333;
        }

        /* Input fields များကို Dark Mode ပြောင်းခြင်း */
        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: white;
        }

        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: white;
            box-shadow: none;
        }

        .preview-img { 
            max-width: 100%; 
            max-height: 300px; 
            border-radius: 10px; 
            display: none; 
            margin-top: 15px; 
            border: 1px solid #30363d; 
        }

        .status-log { 
            max-height: 200px; 
            overflow-y: auto; 
            background: #000; 
            color: #00ff41; 
            padding: 10px; 
            font-family: monospace; 
            font-size: 13px; 
            border-radius: 8px; 
            display: none; 
            border: 1px solid #333;
        }

        .btn-send { 
            padding: 12px; 
            font-weight: bold; 
            font-size: 18px; 
            border-radius: 10px; 
            transition: 0.3s; 
            background-color: #21262d;
            border: 1px solid #f0f6fc1a;
            color: #c9d1d9;
        }

        .btn-send:hover { 
            background-color: #007bff;
            color: white;
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,123,255,0.4); 
        }

        .card-footer {
            background-color: #161b22;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card broadcast-card">
        <div class="card-header text-center">
            <h3 class="mb-0"><i class="fas fa-bullhorn"></i> Bulk Messaging System</h3>
            <small>Send messages to all inbox members</small>
        </div>
        <div class="card-body p-4">
            <div class="mb-4">
                <label class="form-label fw-bold">Message Text</label>
                <textarea id="bcText" class="form-control" rows="5" placeholder="အားလုံးဆီ ပို့ချင်တဲ့ စာကို ဒီမှာရေးပါ..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Attachment (Optional Image)</label>
                <input type="file" id="bcFile" class="form-control" accept="image/*" onchange="previewFile()">
                <img id="imgPreview" class="preview-img">
            </div>

            <div id="statusBox" class="mb-4">
                <div class="progress mb-2" style="display: none; height: 10px; background-color: #30363d;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                </div>
                <div id="logArea" class="status-log"></div>
            </div>

            <button id="sendBtn" onclick="startBroadcast()" class="btn btn-primary w-100 btn-send">
                <i class="fas fa-paper-plane"></i> START BROADCAST
            </button>
        </div>
        <div class="card-footer text-center text-muted">
            <small>Note: To avoid spam detection, we use a 200ms delay between messages.</small>
        </div>
    </div>
</div>

<script>
    function previewFile() {
        const file = document.getElementById('bcFile').files[0];
        const preview = document.getElementById('imgPreview');
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "block";
        }

        if (file) { reader.readAsDataURL(file); } 
        else { preview.style.display = "none"; }
    }

    async function startBroadcast() {
        const text = document.getElementById('bcText').value;
        const fileInput = document.getElementById('bcFile');
        const sendBtn = document.getElementById('sendBtn');
        const logArea = document.getElementById('logArea');
        const progress = document.querySelector('.progress');
        const progressBar = document.getElementById('progressBar');

        if (!text && !fileInput.files[0]) {
            return alert("Please enter text or select an image!");
        }

        if (!confirm("Are you sure you want to send this to ALL members?")) return;

        // UI Updates
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';
        logArea.style.display = "block";
        progress.style.display = "flex";
        logArea.innerHTML = "> Preparing broadcast...\n";

        const formData = new FormData();
        formData.append('text', text);
        if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/api/broadcast', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                logArea.innerHTML += `> Success! Sent to ${result.count} members.\n`;
                progressBar.style.width = "100%";
                progressBar.classList.replace('bg-primary', 'bg-success');
                alert("Broadcast Completed Successfully!");
            } else {
                logArea.innerHTML += `> Error: ${result.error}\n`;
            }
        } catch (err) {
            logArea.innerHTML += `> System Error: ${err.message}\n`;
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> START BROADCAST';
        }
    }
</script>

</body>
</html>
