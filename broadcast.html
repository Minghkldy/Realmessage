<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Messaging - OmniBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { 
            background-color: #0b0e11; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }
        .broadcast-card { 
            max-width: 700px; margin: 50px auto; 
            border: 1px solid #333; border-radius: 15px; 
            background-color: #161b22;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .card-header { 
            background: #007bff; color: white; 
            border-radius: 15px 15px 0 0 !important; padding: 20px; 
        }
        .form-control { background-color: #0d1117; border: 1px solid #30363d; color: white !important; }
        .form-control:focus { background-color: #0d1117; border-color: #58a6ff; box-shadow: none; }
        .preview-img { 
            max-width: 100%; max-height: 250px; border-radius: 10px; 
            display: none; margin-top: 15px; border: 1px solid #30363d; 
        }
        .status-log { 
            max-height: 200px; overflow-y: auto; background: #000; 
            color: #00ff41; padding: 10px; font-family: monospace; 
            font-size: 13px; border-radius: 8px; display: none; border: 1px solid #333;
        }
        .btn-send { 
            padding: 12px; font-weight: bold; font-size: 18px; border-radius: 10px; 
            transition: 0.3s; background-color: #21262d; border: 1px solid #f0f6fc1a; color: white;
        }
        .btn-send:hover { background-color: #007bff; color: white; transform: translateY(-2px); }
        label.form-label { color: #ffffff !important; font-weight: 600; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card broadcast-card">
        <div class="card-header text-center">
            <h3 class="mb-0"><i class="fas fa-bullhorn"></i> Bulk Messaging</h3>
            <small>Send announcements to all contacts</small>
        </div>
        <div class="card-body p-4">
            <div class="mb-4">
                <label class="form-label">Message Content</label>
                <textarea id="bcText" class="form-control" rows="5" placeholder="အားလုံးဆီ ပို့ချင်တဲ့ စာကို ဒီမှာရေးပါ..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label">Image Attachment (Optional)</label>
                <input type="file" id="bcFile" class="form-control" accept="image/*" onchange="previewFile()">
                <div class="text-center">
                    <img id="imgPreview" class="preview-img mx-auto">
                </div>
            </div>

            <div id="statusBox" class="mb-4">
                <div class="progress mb-2" style="display: none; height: 10px; background-color: #30363d;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                </div>
                <div id="logArea" class="status-log"></div>
            </div>

            <button id="sendBtn" onclick="startBroadcast()" class="btn btn-primary w-100 btn-send">
                <i class="fas fa-paper-plane"></i> START BROADCAST
            </button>
        </div>
        <div class="card-footer text-center text-muted">
            <small>Delay: 500ms between messages to prevent rate limits.</small>
        </div>
    </div>
</div>

<script>
    // Parent Dashboard ဆီက Supabase ကို ယူမယ်
    const supabase = window.parent.supabase;

    function previewFile() {
        const file = document.getElementById('bcFile').files[0];
        const preview = document.getElementById('imgPreview');
        const reader = new FileReader();
        reader.onloadend = () => { preview.src = reader.result; preview.style.display = "block"; }
        if (file) reader.readAsDataURL(file);
    }

    async function startBroadcast() {
        const text = document.getElementById('bcText').value;
        const sendBtn = document.getElementById('sendBtn');
        const logArea = document.getElementById('logArea');
        const progressBar = document.getElementById('progressBar');
        const progressDiv = document.querySelector('.progress');

        if (!text) return alert("စာသားအရင်ရိုက်ပါ!");
        if (!confirm("လူတိုင်းဆီ စာပို့မှာ သေချာပါသလား?")) return;

        // UI Prep
        sendBtn.disabled = true;
        logArea.style.display = "block";
        progressDiv.style.display = "flex";
        logArea.innerHTML = "> Fetching member list...\n";

        try {
            // 1. Database ထဲက နာမည်တူမရှိတဲ့ Sender တွေကို ဆွဲထုတ်မယ်
            const { data: contacts, error: fetchErr } = await supabase
                .from('messages')
                .select('sender_name')
                .not('sender_name', 'eq', 'Admin');

            if (fetchErr) throw fetchErr;

            // Unique names list လုပ်မယ်
            const uniqueMembers = [...new Set(contacts.map(c => c.sender_name))];
            const total = uniqueMembers.length;
            logArea.innerHTML += `> Found ${total} members. Starting broadcast...\n`;

            let count = 0;
            for (const member of uniqueMembers) {
                // 2. Message တစ်ခုချင်းစီ Insert လုပ်မယ်
                const { error: sendErr } = await supabase
                    .from('messages')
                    .insert([{
                        sender_name: 'Admin',
                        receiver_name: member,
                        message_text: text,
                        platform: 'broadcast',
                        created_at: new Date()
                    }]);

                if (!sendErr) {
                    count++;
                    const percent = Math.floor((count / total) * 100);
                    progressBar.style.width = percent + "%";
                    logArea.innerHTML += `> [${count}/${total}] Sent to ${member}\n`;
                    logArea.scrollTop = logArea.scrollHeight;
                }

                // Rate limiting အတွက် ခဏနားမယ် (500ms)
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            logArea.innerHTML += `> \n✅ Broadcast Completed! Total: ${count}\n`;
            progressBar.classList.replace('bg-primary', 'bg-success');
            alert("စာပို့ပြီးပါပြီ!");

        } catch (err) {
            logArea.innerHTML += `> Error: ${err.message}\n`;
            console.error(err);
        } finally {
            sendBtn.disabled = false;
        }
    }
</script>
</body>
</html>
