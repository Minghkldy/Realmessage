<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnibot | Update Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass p-10 rounded-[40px] w-full max-w-md shadow-2xl animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-600/10 rounded-[24px] flex items-center justify-center mb-6 mx-auto border border-blue-600/20">
                <i class="fas fa-shield-alt text-blue-500 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">New Password</h1>
            <p class="text-gray-500 text-xs font-medium">လုံခြုံစိတ်ချရသော Password အသစ်တစ်ခု သတ်မှတ်ပါ။</p>
        </div>

        <div class="space-y-4">
            <input type="password" id="new-password" placeholder="New Password" 
                   class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-blue-500 transition-all">
            
            <button onclick="updatePassword()" 
                    class="w-full py-5 rounded-2xl bg-blue-600 text-white text-xs font-black uppercase tracking-[2px] shadow-xl shadow-blue-600/20 hover:scale-[1.02] active:scale-95 transition-all">
                Update Password
            </button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vquzfxzahxesrfjctoef.supabase.co';
        const supabaseKey = 'sb_publishable_Pj8DiYgASNuPsRPh5opbjw_P5W1OtIt'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // စာမျက်နှာစဖွင့်တာနဲ့ URL ကပါလာတဲ့ Recovery Token ကို Session အဖြစ်ပြောင်းပေးဖို့ လိုအပ်ပါတယ်
        window.onload = async () => {
            const { data, error } = await _supabase.auth.getSession();
            if (error) {
                console.error("Session missing or error:", error.message);
            }
        };

        async function updatePassword() {
            const newPassword = document.getElementById('new-password').value;
            
            if (newPassword.length < 6) {
                alert("Password သည် အနည်းဆုံး ၆ လုံး ရှိရပါမည်။");
                return;
            }

            // Supabase ထဲမှာ Password အသစ်ပြောင်းခြင်း
            const { error } = await _supabase.auth.updateUser({ password: newPassword });
            
            if (error) {
                if (error.message.includes("session missing")) {
                    alert("Error: Link သက်တမ်းကုန်သွားပါပြီ။ Email အသစ်ပြန်တောင်းပေးပါ။");
                } else {
                    alert("Error: " + error.message);
                }
            } else {
                alert("Password ပြောင်းလဲပြီးပါပြီ။ Login ပြန်ဝင်ပါ။");
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
