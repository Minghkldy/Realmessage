<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .ios-switch:checked ~ .dot { transform: translateX(100%); background-color: #3b82f6; }
        input, textarea { transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 flex items-center">
            <i class="fas fa-cog mr-3 text-blue-500"></i> General Settings
        </h1>

        <div class="space-y-6">
            
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-blue-400"><i class="fas fa-globe mr-2"></i> Site Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Website Name</label>
                        <input type="text" id="site_name" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="e.g. OmniBot Dashboard">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Admin Nickname</label>
                        <input type="text" id="admin_nickname" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Your Nickname">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-green-400"><i class="fas fa-user-circle mr-2"></i> Admin Profile</h2>
                <div class="flex items-center space-x-6">
                    <div class="relative">
                        <img id="avatar_preview" src="https://ui-avatars.com/api/?name=Admin&background=random" class="w-20 h-20 rounded-full border-2 border-green-500/50 object-cover">
                        <label for="avatar_input" class="absolute bottom-0 right-0 bg-green-500 p-1.5 rounded-full cursor-pointer hover:bg-green-600 transition">
                            <i class="fas fa-camera text-xs"></i>
                        </label>
                        <input type="file" id="avatar_input" class="hidden" accept="image/*">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-400 mb-2">Admin Email</label>
                        <input type="email" id="admin_email" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="admin@example.com">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-orange-400"><i class="fas fa-robot mr-2"></i> Automation & AI</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <span>Enable Auto-Reply Message</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="enable_autoreply" class="sr-only ios-switch">
                            <div class="w-11 h-6 bg-gray-700 rounded-full dot-bg"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Auto-Reply Text</label>
                        <textarea id="autoreply_text" rows="3" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="မင်္ဂလာပါ၊ ခဏစောင့်ပေးပါခင်ဗျာ..."></textarea>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-6">
                    <h2 class="text-lg font-semibold mb-4 text-purple-400"><i class="fas fa-paint-brush mr-2"></i> Appearance</h2>
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <span class="text-sm">Dark Mode Always On</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked class="sr-only ios-switch">
                            <div class="w-11 h-6 bg-gray-700 rounded-full dot-bg"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                        </label>
                    </div>
                </div>
                <div class="glass-card p-6">
                    <h2 class="text-lg font-semibold mb-4 text-yellow-400"><i class="fas fa-bell mr-2"></i> Notifications</h2>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-300">Sound Notification</span>
                            <input type="checkbox" id="notif_sound" class="w-5 h-5 accent-blue-500">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-300">Auto-Refresh Data</span>
                            <input type="checkbox" id="auto_refresh" class="w-5 h-5 accent-blue-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 border-red-500/20">
                <h2 class="text-lg font-semibold mb-4 text-red-400"><i class="fas fa-shield-alt mr-2"></i> Security</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">New Password</label>
                        <input type="password" id="new_password" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Leave blank to keep current">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Confirm Password</label>
                        <input type="password" id="confirm_password" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Confirm new password">
                    </div>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                <i class="fas fa-save mr-2"></i> SAVE ALL SETTINGS
            </button>
        </div>
    </div>

    <script>
        // Preview Avatar Image
        document.getElementById('avatar_input').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('avatar_preview').src = URL.createObjectURL(file);
            }
        }

        // Settings များကို သိမ်းဆည်းရန်
        async function saveSettings() {
            const pass = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (pass && pass !== confirm) {
                return alert("❌ Passwords do not match!");
            }

            const settings = {
                site_name: document.getElementById('site_name').value,
                admin_nickname: document.getElementById('admin_nickname').value,
                admin_email: document.getElementById('admin_email').value,
                enable_autoreply: document.getElementById('enable_autoreply').checked,
                autoreply_text: document.getElementById('autoreply_text').value,
                notif_sound: document.getElementById('notif_sound').checked,
                auto_refresh: document.getElementById('auto_refresh').checked
            };

            // Password ပြောင်းလိုလျှင် ထည့်ပေါင်းမည်
            if (pass) {
                settings.admin_password = pass;
            }
            
            try {
                const response = await fetch('/api/settings/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });

                if (response.ok) {
                    alert("✅ Settings အားလုံးကို အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။");
                    // Dashboard တစ်ခုလုံး Refresh ဖြစ်စေရန်
                    if (window.parent) {
                        window.parent.location.reload();
                    }
                } else {
                    alert("❌ သိမ်းဆည်းရာတွင် အမှားအယွင်းရှိပါသည်။");
                }
            } catch (err) {
                console.error("Save Error:", err);
                alert("❌ Server နှင့် ချိတ်ဆက်၍မရပါ။");
            }
        }

        // စာမျက်နှာပွင့်လာလျှင် လက်ရှိ Settings များကို Database မှ ခေါ်ပြရန်
        window.onload = async () => {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                
                if (data.site_name) document.getElementById('site_name').value = data.site_name;
                if (data.admin_nickname) document.getElementById('admin_nickname').value = data.admin_nickname;
                if (data.admin_email) document.getElementById('admin_email').value = data.admin_email;
                if (data.autoreply_text) document.getElementById('autoreply_text').value = data.autoreply_text;
                
                // Boolean string များကို checkbox အဖြစ် ပြန်ပြောင်းရန်
                document.getElementById('enable_autoreply').checked = (data.enable_autoreply === "true");
                document.getElementById('notif_sound').checked = (data.notif_sound === "true");
                document.getElementById('auto_refresh').checked = (data.auto_refresh === "true");

                // UI Preview Update (optional)
                if (data.admin_nickname) {
                    document.getElementById('avatar_preview').src = `https://ui-avatars.com/api/?name=${data.admin_nickname}&background=random`;
                }

            } catch (e) { 
                console.error("Load Settings Error:", e); 
            }
        };
    </script>
</body>
</html>
