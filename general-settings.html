<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="flex-1 p-8">
        <div class="flex items-center mb-8">
            <button onclick="window.history.back()" class="p-2 bg-gray-900 rounded-full mr-4 hover:bg-gray-800">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-2xl font-bold">Bot Settings</h1>
            <span class="ml-auto text-xs text-gray-500 bg-gray-900 px-3 py-1 rounded-full border border-gray-800">V1.2 STABLE</span>
        </div>

        <div class="max-w-4xl space-y-6">
            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600/20 p-3 rounded-full text-blue-500">
                            <i class="fab fa-telegram-plane text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Telegram Connection</h3>
                            <p class="text-xs text-gray-400">Manage your Telegram Bot API Integration</p>
                        </div>
                    </div>
                    <button class="bg-white text-black px-4 py-1 rounded-md text-sm font-bold hover:bg-gray-200">SAVE</button>
                </div>
                <div class="mt-4">
                    <label class="text-xs text-gray-500 uppercase tracking-wider">Telegram Bot Token</label>
                    <div class="relative mt-2">
                        <input type="password" value="••••••••••••••••••••••••••••••••••••••••••••" 
                               class="w-full bg-black border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500">
                        <i class="far fa-eye absolute right-3 top-3.5 text-gray-600 cursor-pointer"></i>
                    </div>
                    <p class="text-[10px] text-gray-600 mt-2 italic">* You can get this from @BotFather</p>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-purple-600/20 p-3 rounded-full text-purple-500">
                            <i class="fab fa-viber text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Viber Business API</h3>
                            <p class="text-xs text-gray-400">Connect your Viber Partner/Chatbot Account</p>
                        </div>
                    </div>
                    <button class="bg-white text-black px-4 py-1 rounded-md text-sm font-bold hover:bg-gray-200">SAVE</button>
                </div>
                <div class="mt-4">
                    <label class="text-xs text-gray-500 uppercase tracking-wider">Viber Auth Token</label>
                    <div class="relative mt-2">
                        <input type="text" placeholder="Enter Viber Auth Token" 
                               class="w-full bg-black border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-purple-500">
                        <i class="far fa-eye absolute right-3 top-3.5 text-gray-600 cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="bg-pink-600/20 p-3 rounded-full text-pink-500">
                            <i class="fab fa-facebook-messenger text-xl"></i>
                        </div>
                        <div>
                            <h3 class="font-semibold">Meta Integration</h3>
                            <p class="text-xs text-gray-400">Facebook Page & Instagram Business Access</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="px-4 py-1 border border-gray-700 rounded-md text-xs font-bold hover:bg-gray-800 uppercase">Token</button>
                        <button class="px-4 py-1 border border-gray-700 rounded-md text-xs font-bold hover:bg-gray-800 uppercase">Verify</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
