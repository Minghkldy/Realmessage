<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        /* Custom Switch */
        .ios-switch:checked ~ .dot-bg { background-color: #3b82f6; }
        .ios-switch:checked ~ .dot { transform: translateX(100%); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 flex items-center">
            <i class="fas fa-cog mr-3 text-blue-500"></i> General Settings
        </h1>

        <div class="space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-blue-400"><i class="fas fa-globe mr-2"></i> Site Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Website Name</label>
                        <input type="text" id="site_name" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="e.g. OmniBot Dashboard">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Admin Nickname</label>
                        <input type="text" id="admin_nickname" oninput="updateAvatarPreview(this.value)" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Your Nickname">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-green-400"><i class="fas fa-user-circle mr-2"></i> Admin Profile</h2>
                <div class="flex items-center space-x-6">
                    <div class="relative">
                        <img id="avatar_preview" src="https://ui-avatars.com/api/?name=Admin&background=random" class="w-20 h-20 rounded-full border-2 border-green-500/50 object-cover">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-400 mb-2">Admin Email (Login Email)</label>
                        <input type="email" id="admin_email" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none text-gray-400" readonly>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-orange-400"><i class="fas fa-robot mr-2"></i> Automation</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <span>Enable Auto-Reply Message</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="enable_autoreply" class="sr-only ios-switch">
                            <div class="w-11 h-6 bg-gray-700 rounded-full dot-bg transition-colors"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform"></div>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Auto-Reply Text</label>
                        <textarea id="autoreply_text" rows="3" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="မင်္ဂလာပါ၊ ခဏစောင့်ပေးပါခင်ဗျာ..."></textarea>
                    </div>
                </div>
            </div>

            <button onclick="saveSettings()" id="saveBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                <i class="fas fa-save mr-2"></i> SAVE ALL SETTINGS
            </button>
        </div>
    </div>

    <script>
        // Parent Window က Supabase Connection ကို ယူသုံးမယ်
        const supabase = window.parent.supabase;

        function updateAvatarPreview(name) {
            const preview = document.getElementById('avatar_preview');
            if (name.trim() !== "") {
                preview.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;
            }
        }

        // Database ထဲက လက်ရှိ Settings တွေ ဆွဲထုတ်မယ်
        async function loadSettings() {
            try {
                const { data, error } = await supabase
                    .from('settings')
                    .select('*')
                    .single(); // Settings က တစ်ကြောင်းပဲ ရှိရမယ်

                if (data) {
                    document.getElementById('site_name').value = data.site_name || "";
                    document.getElementById('admin_nickname').value = data.admin_nickname || "";
                    document.getElementById('admin_email').value = data.admin_email || "Not Set";
                    document.getElementById('enable_autoreply').checked = data.enable_autoreply;
                    document.getElementById('autoreply_text').value = data.autoreply_text || "";
                    updateAvatarPreview(data.admin_nickname);
                }
            } catch (err) {
                console.error("Load Error:", err);
            }
        }

        // Settings တွေ သိမ်းမယ်
        async function saveSettings() {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> SAVING...';

            const nickname = document.getElementById('admin_nickname').value;
            const updateData = {
                site_name: document.getElementById('site_name').value,
                admin_nickname: nickname,
                enable_autoreply: document.getElementById('enable_autoreply').checked,
                autoreply_text: document.getElementById('autoreply_text').value,
                updated_at: new Date()
            };

            try {
                // လက်ရှိ row ကိုပဲ Update လုပ်မယ် (ID = 1 လို့ ယူဆထားပါတယ်)
                const { error } = await supabase
                    .from('settings')
                    .update(updateData)
                    .eq('id', 1);

                if (error) throw error;

                // Sidebar က Profile တွေပါ ချက်ချင်းပြောင်းသွားအောင် LocalStorage နဲ့ Event သုံးမယ်
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(nickname)}&background=random&color=fff`;
                localStorage.setItem('admin_nickname', nickname);
                localStorage.setItem('admin_avatar', avatarUrl);

                if (window.parent) {
                    const event = new CustomEvent('profileUpdate', { 
                        detail: { nickname, avatar: avatarUrl } 
                    });
                    window.parent.dispatchEvent(event);
                }

                alert("✅ Settings အားလုံးကို သိမ်းဆည်းပြီးပါပြီ။");
            } catch (err) {
                alert("❌ Error: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i> SAVE ALL SETTINGS';
            }
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
