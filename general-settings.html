<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .ios-switch:checked ~ .dot { transform: translateX(100%); background-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Website Settings</h1>

        <div class="space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-blue-400"><i class="fas fa-globe mr-2"></i> Site Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Website Name</label>
                        <input type="text" id="site_name" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. OmniBot Dashboard">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Admin Nickname</label>
                        <input type="text" id="admin_nickname" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Your Nickname">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-purple-400"><i class="fas fa-paint-brush mr-2"></i> Appearance</h2>
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                    <span>Dark Mode Always On</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" checked class="sr-only ios-switch">
                        <div class="w-11 h-6 bg-gray-700 rounded-full dot-bg"></div>
                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                    </label>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-yellow-400"><i class="fas fa-bell mr-2"></i> Notifications</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-300">Sound Notification for New Messages</span>
                        <input type="checkbox" id="notif_sound" class="w-5 h-5 accent-blue-500">
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-300">Auto-Refresh Dashboard Data</span>
                        <input type="checkbox" id="auto_refresh" class="w-5 h-5 accent-blue-500">
                    </div>
                </div>
            </div>

            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20">
                SAVE ALL SETTINGS
            </button>
        </div>
    </div>

    <script>
        async function saveSettings() {
            const settings = {
                site_name: document.getElementById('site_name').value,
                admin_nickname: document.getElementById('admin_nickname').value,
                notif_sound: document.getElementById('notif_sound').checked,
                auto_refresh: document.getElementById('auto_refresh').checked
            };
            
            const response = await fetch('/api/settings/bulk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            });

            if (response.ok) alert("Settings saved successfully!");
        }

        // Load current settings on start
        window.onload = async () => {
            const res = await fetch('/api/settings');
            const data = await res.json();
            if(data.site_name) document.getElementById('site_name').value = data.site_name;
            if(data.admin_nickname) document.getElementById('admin_nickname').value = data.admin_nickname;
        };
    </script>
</body>
</html>
