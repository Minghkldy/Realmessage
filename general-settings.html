<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .ios-switch:checked ~ .dot { transform: translateX(100%); background-color: #3b82f6; }
        input, textarea { transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 flex items-center">
            <i class="fas fa-cog mr-3 text-blue-500"></i> General Settings
        </h1>

        <div class="space-y-6">
            
            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-blue-400"><i class="fas fa-globe mr-2"></i> Site Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Website Name</label>
                        <input type="text" id="site_name" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="e.g. OmniBot Dashboard">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Admin Nickname</label>
                        <input type="text" id="admin_nickname" oninput="updateAvatarPreview(this.value)" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Your Nickname">
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-green-400"><i class="fas fa-user-circle mr-2"></i> Admin Profile</h2>
                <div class="flex items-center space-x-6">
                    <div class="relative">
                        <img id="avatar_preview" src="https://ui-avatars.com/api/?name=Admin&background=random" class="w-20 h-20 rounded-full border-2 border-green-500/50 object-cover">
                        <label for="avatar_input" class="absolute bottom-0 right-0 bg-green-500 p-1.5 rounded-full cursor-pointer hover:bg-green-600 transition">
                            <i class="fas fa-camera text-xs"></i>
                        </label>
                        <input type="file" id="avatar_input" class="hidden" accept="image/*">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-400 mb-2">Admin Email</label>
                        <input type="email" id="admin_email" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none text-gray-500 cursor-not-allowed" placeholder="admin@example.com" readonly>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-lg font-semibold mb-4 text-orange-400"><i class="fas fa-robot mr-2"></i> Automation & AI</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <span>Enable Auto-Reply Message</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="enable_autoreply" class="sr-only ios-switch">
                            <div class="w-11 h-6 bg-gray-700 rounded-full dot-bg"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Auto-Reply Text</label>
                        <textarea id="autoreply_text" rows="3" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="မင်္ဂလာပါ၊ ခဏစောင့်ပေးပါခင်ဗျာ..."></textarea>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 border-red-500/20">
                <h2 class="text-lg font-semibold mb-4 text-red-400"><i class="fas fa-shield-alt mr-2"></i> Security</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm text-gray-400 mb-2">Current Password</label>
                        <input type="password" id="old_password_input" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none mb-4" placeholder="Enter current password">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">New Password</label>
                        <input type="password" id="new_password_input" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="New password">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Confirm Password</label>
                        <input type="password" id="confirm_password_input" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg focus:outline-none" placeholder="Confirm new password">
                    </div>
                </div>
                <button onclick="handlePasswordUpdate()" class="mt-4 px-6 py-2 bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 rounded-lg transition-all text-sm font-bold">
                    UPDATE PASSWORD ONLY
                </button>
            </div>

            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                <i class="fas fa-save mr-2"></i> SAVE ALL SETTINGS
            </button>
        </div>
    </div>

    <script>
        // Supabase Initialization
        // Supabase Initialization
const SUB_URL = "https://vquzfxzahxesrfjctoef.supabase.co"; 
const SUB_KEY = "sb_publishable_Pj8DiYgASNuPsRPh5opbjw_P5W1OtIt";
const _supabase = supabase.createClient(SUB_URL, SUB_KEY);

        function updateAvatarPreview(name) {
            const preview = document.getElementById('avatar_preview');
            if (name.trim() !== "" && !document.getElementById('avatar_input').files.length) {
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff`;
                preview.src = avatarUrl;
            }
        }

        document.getElementById('avatar_input').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('avatar_preview').src = URL.createObjectURL(file);
            }
        }

        async function handlePasswordUpdate() {
            const oldPw = document.getElementById('old_password_input').value;
            const newPw = document.getElementById('new_password_input').value;
            const confirmPw = document.getElementById('confirm_password_input').value;

            if (window.parent && typeof window.parent.updatePassword === 'function') {
                await window.parent.updatePassword(oldPw, newPw, confirmPw);
                document.getElementById('old_password_input').value = "";
                document.getElementById('new_password_input').value = "";
                document.getElementById('confirm_password_input').value = "";
            } else {
                alert("စနစ်အတွင်း အမှားအယွင်းရှိနေပါသည်။");
            }
        }

        async function saveSettings() {
            const pass = document.getElementById('new_password_input').value;
            const confirm = document.getElementById('confirm_password_input').value;
            
            if (pass && pass !== confirm) {
                return alert("❌ Passwords do not match!");
            }

            const formData = new FormData();
            const nickname = document.getElementById('admin_nickname').value;
            formData.append('site_name', document.getElementById('site_name').value);
            formData.append('admin_nickname', nickname);
            formData.append('admin_email', document.getElementById('admin_email').value);
            formData.append('enable_autoreply', document.getElementById('enable_autoreply').checked);
            formData.append('autoreply_text', document.getElementById('autoreply_text').value);

            if (pass) {
                await handlePasswordUpdate();
            }

            const avatarInput = document.getElementById('avatar_input');
            let finalAvatarUrl = "";

            if (avatarInput.files.length > 0) {
                formData.append('avatar', avatarInput.files[0]);
            } else {
                finalAvatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(nickname)}&background=random&color=fff`;
                formData.append('admin_avatar', finalAvatarUrl);
            }
            
            try {
                const response = await fetch('/api/settings/bulk', {
                    method: 'POST',
                    body: formData 
                });

                if (response.ok) {
                    const result = await response.json();
                    const updatedAvatar = result.admin_avatar || finalAvatarUrl;
                    
                    localStorage.setItem('admin_avatar', updatedAvatar);
                    localStorage.setItem('admin_nickname', nickname);

                    if (window.parent) {
                        const event = new CustomEvent('profileUpdate', { 
                            detail: { avatar: updatedAvatar, nickname: nickname } 
                        });
                        window.parent.dispatchEvent(event);
                    }

                    alert("✅ Settings အားလုံးကို အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။");
                    
                } else {
                    alert("✅ Site settings saved (Password requires separate update if errored).");
                }
            } catch (err) {
                console.error("Save Error:", err);
                alert("❌ Server နှင့် ချိတ်ဆက်၍မရပါ။");
            }
        }

        window.onload = async () => {
            try {
                // ၁။ Supabase Auth ကနေ လက်ရှိ Login ဝင်ထားတဲ့ User Email ကို တိုက်ရိုက်ယူခြင်း
                const { data: { user }, error: authError } = await _supabase.auth.getUser();
                if (user) {
                    document.getElementById('admin_email').value = user.email;
                }

                // ၂။ ကျန်ရှိသော Settings များ API မှ Load လုပ်ခြင်း
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const data = await res.json();
                    
                    if (data.site_name) document.getElementById('site_name').value = data.site_name;
                    if (data.admin_nickname) {
                        document.getElementById('admin_nickname').value = data.admin_nickname;
                        const currentAvatar = data.admin_avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.admin_nickname)}&background=random&color=fff`;
                        document.getElementById('avatar_preview').src = currentAvatar;
                    }
                    if (data.autoreply_text) document.getElementById('autoreply_text').value = data.autoreply_text;
                    
                    if(document.getElementById('enable_autoreply')) {
                        document.getElementById('enable_autoreply').checked = (data.enable_autoreply === "true" || data.enable_autoreply === true);
                    }
                }
            } catch (e) { 
                console.error("Load Settings Error:", e); 
            }
        };
    </script>
</body>
</html>
