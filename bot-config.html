<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#0a0a0a',
                        'border-gray': '#1f1f1f',
                        'accent-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #000000; color: #ffffff; margin: 0;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 10px; }
        .setting-input { transition: all 0.2s ease-in-out; }
        .setting-input:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); background-color: #050505; }
        #toast {
            visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333;
            color: #fff; text-align: center; border-radius: 12px; padding: 16px;
            position: fixed; z-index: 50; left: 50%; bottom: 30px; font-size: 14px;
            border: 1px solid #3B82F6;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="min-h-screen bg-pure-black p-4 md:p-6 text-slate-200">

    <div id="toast">Message goes here</div>

    <div class="w-full max-w-2xl mx-auto space-y-8 my-6">
        <div class="flex items-center justify-between sticky top-0 bg-pure-black/80 backdrop-blur-md py-4 z-10 border-b border-border-gray/50 mb-4">
            <div class="flex items-center gap-4">
                <button onclick="window.parent.switchToInbox()" class="w-10 h-10 rounded-full border border-border-gray flex items-center justify-center hover:bg-dark-gray transition active:scale-90">
                    <i class="fas fa-arrow-left text-gray-400"></i>
                </button>
                <h1 class="text-xl md:text-2xl font-bold tracking-tight">Bot Settings</h1>
            </div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest bg-dark-gray px-3 py-1 rounded-full border border-border-gray">
                v1.2 Stable
            </div>
        </div>

        <div class="grid gap-6">
            <div class="bg-dark-gray border border-border-gray rounded-2xl p-6 md:p-8 space-y-6">
                <div class="flex items-center justify-between border-b border-border-gray pb-4">
                    <div class="flex items-center gap-3">
                        <i class="fab fa-telegram text-2xl text-sky-500"></i>
                        <div>
                            <h2 class="font-bold text-sm">Telegram Connection</h2>
                            <p class="text-[11px] text-gray-500">Manage API Integration</p>
                        </div>
                    </div>
                    <button onclick="saveAllSettings()" class="bg-pure-black border border-border-gray px-4 py-2 rounded-lg text-[10px] font-bold hover:border-sky-500 hover:text-sky-500 transition uppercase">Save</button>
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Telegram Bot Token</label>
                    <div class="relative">
                        <input type="password" id="telegram_token" class="setting-input w-full bg-pure-black border border-border-gray rounded-xl p-4 text-sm outline-none focus:border-accent-blue" placeholder="123456789:ABC...">
                        <i onclick="toggleVisibility('telegram_token', this)" class="fas fa-eye absolute right-4 top-4 text-gray-600 cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="bg-dark-gray border border-border-gray rounded-2xl p-6 md:p-8 space-y-6">
                <div class="flex items-center justify-between border-b border-border-gray pb-4">
                    <div class="flex items-center gap-3">
                        <i class="fab fa-viber text-2xl text-purple-500"></i>
                        <div>
                            <h2 class="font-bold text-sm">Viber Business API</h2>
                            <p class="text-[11px] text-gray-500">Connect Chatbot Account</p>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Viber Auth Token</label>
                    <div class="relative mt-2">
                        <input type="password" id="viber_auth_token" class="setting-input w-full bg-pure-black border border-border-gray rounded-xl p-4 text-sm outline-none focus:border-purple-500" placeholder="Enter Viber Auth Token">
                        <i onclick="toggleVisibility('viber_auth_token', this)" class="fas fa-eye absolute right-4 top-4 text-gray-600 cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="bg-dark-gray border border-border-gray rounded-2xl p-6 md:p-8 space-y-6">
                <div class="flex items-center justify-between border-b border-border-gray pb-4">
                    <div class="flex items-center gap-3">
                        <i class="fab fa-facebook-messenger text-2xl text-pink-500"></i>
                        <div>
                            <h2 class="font-bold text-sm">Meta Integration</h2>
                            <p class="text-[11px] text-gray-500">Facebook Page Access</p>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Page Access Token</label>
                        <input type="password" id="meta_page_access_token" class="setting-input w-full bg-pure-black border border-border-gray rounded-xl p-4 text-sm outline-none focus:border-pink-500" placeholder="EAAB...">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Verify Token</label>
                        <input type="text" id="meta_verify_token" class="setting-input w-full bg-pure-black border border-border-gray rounded-xl p-4 text-sm outline-none focus:border-pink-500" placeholder="Webhook String">
                    </div>
                </div>
            </div>

            <div class="pb-10">
                <button id="save-btn" onclick="saveAllSettings()" class="w-full bg-accent-blue py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-600 transition active:scale-95 shadow-lg shadow-blue-500/20">
                    Save All Configurations
                </button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Initialization (Parent window ဆီကနေယူမယ်)
        const supabase = window.parent.supabase;

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }

        function toggleVisibility(id, icon) {
            const el = document.getElementById(id);
            if (el.type === 'password') {
                el.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                el.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Settings တွေကို Database ကနေ ပြန်ဆွဲထုတ်မယ်
        async function loadSettings() {
            if (!supabase) return;
            try {
                const { data, error } = await supabase
                    .from('settings')
                    .select('*')
                    .single(); // Table တစ်ခုထဲမှာ row တစ်ခုပဲရှိမယ်လို့ ယူဆပါတယ်

                if (data) {
                    Object.keys(data).forEach(key => {
                        const input = document.getElementById(key);
                        if (input) input.value = data[key];
                    });
                }
            } catch (err) { console.error("Load failed:", err); }
        }

        // အကုန်လုံးကို တစ်ခါတည်း သိမ်းမယ်
        async function saveAllSettings() {
            const btn = document.getElementById('save-btn');
            const inputs = document.querySelectorAll('.setting-input');
            const updateData = {};

            inputs.forEach(input => {
                updateData[input.id] = input.value;
            });

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                // Settings table ထဲမှာ ID 1 ရှိတဲ့ row ကို update လုပ်မယ် (မရှိရင် insert လုပ်မယ်)
                const { error } = await supabase
                    .from('settings')
                    .upsert({ id: 1, ...updateData });

                if (error) throw error;
                showToast("✅ Settings updated successfully!");
            } catch (err) {
                showToast("❌ Error: " + err.message);
            } finally {
                btn.innerHTML = 'Save All Configurations';
                btn.disabled = false;
            }
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
